<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="1920" height="1080" fill="#FFFFFF"/>

  <!-- Y axis -->
  <line x1="780" y1="85" x2="780" y2="1000" stroke="#1E293B" stroke-width="2.5"/>
  <polygon points="780,68 766,95 794,95" fill="#1E293B"/>
  <text x="790" y="95" font-size="20" font-weight="600" fill="#1E293B">Peer-to-peer coordination</text>
  <text x="790" y="990" font-size="20" font-weight="600" fill="#1E293B">No agent coordination</text>

  <!-- X axis -->
  <line x1="110" y1="540" x2="1870" y2="540" stroke="#1E293B" stroke-width="2.5"/>
  <polygon points="1885,540 1857,526 1857,554" fill="#1E293B"/>
  <text x="130" y="570" font-size="20" font-weight="600" fill="#1E293B">Single host / cloud-only</text>
  <text x="1857" y="570" font-size="20" font-weight="600" fill="#1E293B" text-anchor="end">Across user devices (phone + laptop + server + cloud)</text>

  <!-- Q2 box 1: Single-host peer / swarm -->
  <g>
    <rect x="155" y="130" width="595" height="115" rx="12" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
    <circle cx="180" cy="158" r="6" fill="#3B82F6"/>
    <text x="195" y="166" font-size="22" font-weight="700" fill="#1E40AF">Single-host peer / swarm</text>
    <text x="175" y="202" font-size="20" fill="#1E3A8A">LangGraph (swarm)</text>
    <text x="175" y="232" font-size="20" fill="#1E3A8A">CrewAI</text>
  </g>

  <!-- Q2 box 2: Cloud-to-cloud A2A peer -->
  <g>
    <rect x="155" y="280" width="595" height="100" rx="12" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1.5"/>
    <circle cx="180" cy="308" r="6" fill="#8B5CF6"/>
    <text x="195" y="316" font-size="22" font-weight="700" fill="#5B21B6">Cloud-to-cloud A2A peer</text>
    <text x="175" y="352" font-size="20" fill="#4C1D95">Salesforce Agentforce 3  ·  Google A2A / Vertex</text>
  </g>

  <!-- Q1 agentserver -->
  <g>
    <circle cx="1300" cy="240" r="135" fill="#FED7AA" opacity="0.35"/>
    <circle cx="1300" cy="240" r="92" fill="#FB923C" opacity="0.4"/>
    <polygon points="1300,170 1318,216 1367,218 1329,249 1341,297 1300,270 1259,297 1271,249 1233,218 1282,216" fill="#F97316" stroke="#9A3412" stroke-width="2.5"/>
    <text x="1300" y="365" font-size="34" font-weight="800" fill="#9A3412" text-anchor="middle">agentserver</text>
    <text x="1300" y="397" font-size="18" fill="#7C2D12" text-anchor="middle">cloud sandbox + server + laptop + phone,</text>
    <text x="1300" y="423" font-size="18" fill="#7C2D12" text-anchor="middle">peer delegation across heterogeneous executors</text>
  </g>

  <!-- Q3 box 1: Hierarchical / supervisor -->
  <g>
    <rect x="155" y="605" width="595" height="100" rx="12" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="175" y="640" font-size="22" font-weight="700" fill="#475569">◐ Hierarchical / supervisor</text>
    <text x="175" y="680" font-size="20" fill="#334155">Claude Code Agent Teams</text>
  </g>

  <!-- Q3 box 2: Single sandbox / no peer collab -->
  <g>
    <rect x="155" y="735" width="595" height="115" rx="12" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5"/>
    <text x="175" y="770" font-size="22" font-weight="700" fill="#334155">● Single sandbox / no peer collab</text>
    <text x="175" y="807" font-size="20" fill="#1E293B">Claude Code on the web</text>
    <text x="175" y="837" font-size="20" fill="#1E293B">GitHub Copilot Coding Agent</text>
  </g>

  <!-- Q4 box: Multi-device control, cloud-only execution -->
  <g>
    <rect x="820" y="685" width="1040" height="200" rx="12" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
    <rect x="820" y="685" width="8" height="200" rx="4" fill="#D97706"/>
    <text x="850" y="725" font-size="22" font-weight="700" fill="#92400E">◧ Multi-device control surface, cloud-only execution</text>
    <text x="850" y="765" font-size="20" fill="#78350F">Cursor Background Agents (Cursor 3)</text>
    <text x="850" y="795" font-size="20" fill="#78350F">Claude Code Remote</text>
    <text x="850" y="825" font-size="20" fill="#78350F">Warp Oz</text>
    <text x="850" y="862" font-size="14" font-style="italic" fill="#92400E">command launchable from phone / Slack / web — but execution stays in the cloud</text>
  </g>

  <!-- Footnote -->
  <text x="130" y="1035" font-size="15" fill="#64748B">Note: "Across user devices" covers control surface and execution. agentserver is the only platform shown where agents actually run on heterogeneous user devices as peers.</text>
</svg>
