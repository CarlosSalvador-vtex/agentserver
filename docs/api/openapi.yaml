          nullable: true
        max_idle_timeout:
          type: integer
          nullable: true
        max_sandbox_cpu:
          type: integer
          nullable: true
        max_sandbox_memory:
          type: integer
          nullable: true
        max_sandboxes:
          type: integer
          nullable: true
        max_total_cpu:
          type: integer
          nullable: true
        max_total_memory:
          type: integer
          nullable: true
        updated_at:
          type: string
      required:
        - updated_at
