<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <style>
      .title { font-size: 44px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-size: 22px; fill: #64748b; font-style: italic; }
      .box { fill: #ffffff; stroke: #475569; stroke-width: 1.5; rx: 8; }
      .boxClient { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.5; rx: 8; }
      .boxControl { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; rx: 8; }
      .boxData { fill: #f3e8ff; stroke: #9333ea; stroke-width: 1.5; rx: 8; }
      .boxExt { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.5; stroke-dasharray: 5,3; rx: 8; }
      .boxLabel { font-size: 22px; font-weight: 600; fill: #0f172a; text-anchor: middle; }
      .boxLabelSmall { font-size: 18px; fill: #475569; text-anchor: middle; }
      .arrow { stroke: #475569; stroke-width: 1.5; fill: none; }
      .arrowLabel { font-size: 17px; fill: #64748b; text-anchor: middle; }
      .legend { font-size: 17px; fill: #475569; }
    </style>
  </defs>

  <!-- Header -->
  <text x="700" y="50" class="title" text-anchor="middle">Stage 1 · code-server for Coding Agents</text>
  <text x="700" y="80" class="subtitle" text-anchor="middle">Initial release · per-user sandbox containers · agent loop lives inside the sandbox</text>

  <!-- Legend -->
  <g transform="translate(40, 90)">
    <rect x="0" y="0" width="14" height="14" class="boxClient"/><text x="22" y="11" class="legend">Client</text>
    <rect x="80" y="0" width="14" height="14" class="boxControl"/><text x="102" y="11" class="legend">Control</text>
    <rect x="170" y="0" width="14" height="14" class="box"/><text x="192" y="11" class="legend">Service</text>
    <rect x="255" y="0" width="14" height="14" class="boxData"/><text x="277" y="11" class="legend">Data</text>
    <rect x="335" y="0" width="14" height="14" class="boxExt"/><text x="357" y="11" class="legend">External</text>
  </g>

  <!-- Browser (top center) -->
  <rect x="500" y="140" width="300" height="70" class="boxClient"/>
  <text x="650" y="172" class="boxLabel">Browser (Web UI)</text>
  <text x="650" y="192" class="boxLabelSmall">cli-server frontend (React shell)</text>

  <!-- cli-server (left) -->
  <rect x="120" y="290" width="280" height="100" class="boxControl"/>
  <text x="260" y="320" class="boxLabel">cli-server</text>
  <text x="260" y="340" class="boxLabelSmall">control plane</text>
  <text x="260" y="360" class="boxLabelSmall">Sessions list · Open / Pause sbx</text>
  <text x="260" y="378" class="boxLabelSmall">REST API · auth</text>

  <!-- Subdomain Proxy (right) -->
  <rect x="900" y="290" width="280" height="100" class="box"/>
  <text x="1040" y="320" class="boxLabel">Subdomain Proxy</text>
  <text x="1040" y="340" class="boxLabelSmall">{sid}.{host} routing</text>
  <text x="1040" y="360" class="boxLabelSmall">token-based auth</text>

  <!-- PostgreSQL (bottom-left) -->
  <rect x="120" y="490" width="280" height="80" class="boxData"/>
  <text x="260" y="520" class="boxLabel">PostgreSQL</text>
  <text x="260" y="540" class="boxLabelSmall">sessions · users</text>

  <!-- Sandbox Pods (stacked cards = many users) -->
  <rect x="520" y="490" width="580" height="220" class="box" stroke-dasharray="6,3" stroke-width="2" opacity="0.35"/>
  <rect x="510" y="480" width="580" height="220" class="box" stroke-dasharray="6,3" stroke-width="2" opacity="0.65"/>
  <rect x="500" y="470" width="580" height="220" class="box" stroke-dasharray="6,3" stroke-width="2"/>
  <text x="790" y="497" class="boxLabel">Sandbox Pods  (one per user · ×N)</text>

  <!-- opencode/Claude inside sandbox -->
  <rect x="540" y="510" width="500" height="80" class="box"/>
  <text x="790" y="538" class="boxLabel">opencode  /  Claude Code</text>
  <text x="790" y="558" class="boxLabelSmall">★ agent loop lives HERE ★</text>
  <text x="790" y="576" class="boxLabelSmall">reason · plan · act (in-process)</text>

  <!-- Anthropic Proxy inside sandbox -->
  <rect x="540" y="610" width="500" height="60" class="box"/>
  <text x="790" y="635" class="boxLabel">Anthropic Proxy</text>
  <text x="790" y="654" class="boxLabelSmall">isolates real API key from sandbox</text>

  <!-- Anthropic API (external, right) -->
  <rect x="1140" y="615" width="220" height="60" class="boxExt"/>
  <text x="1250" y="650" class="boxLabel">Anthropic API</text>

  <!-- ============== Arrows (all orthogonal) ============== -->

  <!-- Browser → cli-server (down then left) -->
  <path d="M 580,210 V 250 H 260 V 290" class="arrow" marker-end="url(#arrow)"/>
  <text x="380" y="245" class="arrowLabel">main domain</text>

  <!-- Browser → Subdomain Proxy (down then right) -->
  <path d="M 720,210 V 250 H 1040 V 290" class="arrow" marker-end="url(#arrow)"/>
  <text x="920" y="245" class="arrowLabel">subdomain {sid}</text>

  <!-- cli-server → PostgreSQL (straight down) -->
  <path d="M 260,390 V 490" class="arrow" marker-end="url(#arrow)"/>
  <text x="290" y="445" class="arrowLabel">read/write</text>

  <!-- cli-server → Sandbox (right then down — control plane creates pod) -->
  <path d="M 400,360 H 460 V 470 H 500" class="arrow" marker-end="url(#arrow)" stroke-dasharray="3,3"/>
  <text x="450" y="420" class="arrowLabel">K8s API</text>
  <text x="450" y="436" class="arrowLabel">create pod</text>

  <!-- Subdomain Proxy → opencode (straight down into sandbox) -->
  <path d="M 1040,390 V 510" class="arrow" marker-end="url(#arrow)"/>
  <text x="1080" y="455" class="arrowLabel">HTTP reverse</text>
  <text x="1080" y="471" class="arrowLabel">proxy</text>

  <!-- opencode → Anthropic Proxy (vertical inside sandbox) -->
  <path d="M 790,590 V 610" class="arrow" marker-end="url(#arrow)"/>

  <!-- Anthropic Proxy → Anthropic API (horizontal right) -->
  <path d="M 1040,645 H 1140" class="arrow" marker-end="url(#arrow)"/>

  <!-- Footer note -->
  <text x="700" y="775" font-size="16" fill="#475569" text-anchor="middle" font-style="italic">
    Sandbox is an "IDE container" — agent reasons and acts entirely inside its own pod. Control plane only manages lifecycle.
  </text>
</svg>
