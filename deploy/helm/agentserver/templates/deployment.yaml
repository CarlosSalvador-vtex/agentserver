{{- if .Values.database }}
{{- fail "\n\nDEPRECATED: 'database.url' has been removed in chart 0.11.0.\nUse 'postgresql.enabled: true' (default) for an internal PostgreSQL instance,\nor configure 'externalDatabase' for an external database.\nSee values.yaml for details." }}
{{- end }}
{{- if and (not .Values.postgresql.enabled) (not .Values.externalDatabase.existingSecret) (not .Values.externalDatabase.url) (not .Values.externalDatabase.host) }}
{{- fail "\n\nNo database configured. Either:\n  1. Set postgresql.enabled=true (default) for an internal PostgreSQL instance\n  2. Set externalDatabase.url to a PostgreSQL connection string\n  3. Set externalDatabase.host (and user/password/database) for an external database\n  4. Set externalDatabase.existingSecret to an existing secret with a 'database-url' key" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  # New pod must be Ready before the old one is removed. With the
  # default 25%/25% on a 1-replica deployment, the old pod could be
  # killed before the new one is serving — codex-exec-gateway then
  # returns 401 from the validator round-trip and every codex client
  # disconnects with `executor registry authentication error`.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      annotations:
        agentserver.x-k8s.io/chart-version: {{ .Chart.AppVersion | quote }}
      labels:
        app: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.postgresql.enabled }}
      initContainers:
        - name: wait-for-postgresql
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          command:
            - sh
            - -c
            - |
              until pg_isready -h {{ .Release.Name }}-postgresql -p 5432 -U {{ .Values.postgresql.auth.username }}; do
                echo "Waiting for PostgreSQL to be ready..."
                sleep 2
              done
      {{- end }}
      containers:
        - name: agentserver
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--backend"
            - "k8s"
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentserver.databaseSecretName" . }}
                  key: database-url
            - name: SANDBOX_BACKEND
              value: "k8s"
            - name: QUOTA_MAX_WORKSPACES_PER_USER
              value: {{ .Values.platform.defaultQuotas.userMaxWorkspaces | quote }}
            - name: QUOTA_MAX_SANDBOXES_PER_WORKSPACE
              value: {{ .Values.platform.defaultQuotas.workspaceMaxSandboxes | quote }}
            - name: QUOTA_DEFAULT_SANDBOX_CPU
              value: {{ .Values.platform.defaultQuotas.maxSandboxCpu | quote }}
            - name: QUOTA_DEFAULT_SANDBOX_MEMORY
              value: {{ .Values.platform.defaultQuotas.maxSandboxMemory | quote }}
            - name: USER_DRIVE_SIZE
              value: {{ .Values.platform.defaultQuotas.maxWorkspaceDriveSize | quote }}
            - name: QUOTA_WS_MAX_TOTAL_CPU
              value: {{ .Values.platform.defaultQuotas.workspaceMaxTotalCpu | quote }}
            - name: QUOTA_WS_MAX_TOTAL_MEMORY
              value: {{ .Values.platform.defaultQuotas.workspaceMaxTotalMemory | quote }}
            - name: QUOTA_WS_MAX_IDLE_TIMEOUT
              value: {{ .Values.platform.defaultQuotas.workspaceMaxIdleTimeout | quote }}
            - name: PASSWORD_AUTH_ENABLED
              value: {{ ternary "true" "false" .Values.platform.auth.password.enabled | quote }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: anthropic-api-key
            - name: ANTHROPIC_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: anthropic-base-url
            - name: ANTHROPIC_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: anthropic-auth-token
            - name: GOOGLE_GEMINI_BASE_URL
              value: {{ printf "http://%s-llmproxy.%s.svc:%v" .Release.Name .Release.Namespace (int .Values.llmproxy.port) | quote }}
            {{- /* Build OPENCODE_CONFIG_CONTENT with llmproxy baseURL merged in.
                 Users can override baseURL via sandbox.opencode.config.provider.anthropic.options.baseURL */}}
            {{- $llmproxyURL := printf "http://%s-llmproxy.%s.svc:%v/v1" .Release.Name .Release.Namespace (int .Values.llmproxy.port) }}
            {{- $opcodeBase := deepCopy .Values.sandbox.llmProxyConfig }}
            {{- $proxyOpts := dict "baseURL" $llmproxyURL }}
            {{- $proxyProvider := dict "options" $proxyOpts }}
            {{- $providerBlock := dict "anthropic" $proxyProvider }}
            {{- $existingProvider := default dict (get $opcodeBase "provider") }}
            {{- $_ := set $opcodeBase "provider" (merge $existingProvider $providerBlock) }}
            - name: OPENCODE_CONFIG_CONTENT
              value: {{ $opcodeBase | toJson | quote }}
            - name: AGENT_IMAGE
              value: {{ .Values.sandbox.openclaw.image | default "" | quote }}
            {{- if .Values.sandbox.tolerations }}
            - name: SANDBOX_TOLERATIONS
              value: {{ .Values.sandbox.tolerations | toJson | quote }}
            {{- end }}
            {{- if .Values.sandbox.workspaceDriveAccessModes }}
            - name: WORKSPACE_DRIVE_ACCESS_MODES
              value: {{ .Values.sandbox.workspaceDriveAccessModes | quote }}
            {{- end }}
            {{- if .Values.sandbox.openclaw.image }}
            - name: OPENCLAW_IMAGE
              value: {{ .Values.sandbox.openclaw.image | quote }}
            {{- end }}
            {{- if .Values.sandbox.baseDomain }}
            - name: BASE_DOMAIN
              {{- $allDomains := list .Values.sandbox.baseDomain }}
              {{- range .Values.sandbox.additionalBaseDomains }}
              {{- $allDomains = append $allDomains . }}
              {{- end }}
              value: {{ join "," $allDomains | quote }}
            {{- end }}
            - name: SESSION_STORAGE_SIZE
              value: {{ .Values.sandbox.sessionStorageSize | quote }}
            {{- if .Values.sandbox.sessionStorageClassName }}
            - name: STORAGE_CLASS
              value: {{ .Values.sandbox.sessionStorageClassName | quote }}
            {{- end }}
            {{- if .Values.sandbox.workspaceStorageClassName }}
            - name: USER_DRIVE_STORAGE_CLASS
              value: {{ .Values.sandbox.workspaceStorageClassName | quote }}
            {{- end }}
            - name: SANDBOX_NAMESPACE_PREFIX
              value: {{ .Values.sandbox.namespacePrefix | default "agent-ws" | quote }}
            - name: AGENTSERVER_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: NETWORKPOLICY_ENABLED
              value: {{ .Values.sandbox.networkPolicy.enabled | default false | quote }}
            {{- if .Values.sandbox.networkPolicy.denyCIDRs }}
            - name: NETWORKPOLICY_DENY_CIDRS
              value: {{ join "," .Values.sandbox.networkPolicy.denyCIDRs | quote }}
            {{- end }}
            {{- if .Values.sandbox.openclaw.runtimeClassName }}
            - name: OPENCLAW_RUNTIME_CLASS
              value: {{ .Values.sandbox.openclaw.runtimeClassName | quote }}
            {{- end }}
            {{- if .Values.sandbox.openclaw.weixinEnabled }}
            - name: OPENCLAW_WEIXIN_ENABLED
              value: "true"
            {{- end }}
            {{- if .Values.sandbox.hermes.image }}
            - name: HERMES_IMAGE
              value: {{ .Values.sandbox.hermes.image | quote }}
            {{- end }}
            {{- if .Values.sandbox.hermes.runtimeClassName }}
            - name: HERMES_RUNTIME_CLASS
              value: {{ .Values.sandbox.hermes.runtimeClassName | quote }}
            {{- end }}
            {{- if .Values.sandbox.hermes.subdomainPrefix }}
            - name: HERMES_SUBDOMAIN_PREFIX
              value: {{ .Values.sandbox.hermes.subdomainPrefix | quote }}
            {{- end }}
            {{- if .Values.sandbox.hermes.config }}
            - name: HERMES_CONFIGMAP_NAME
              value: {{ printf "%s-hermes-config" .Release.Name | quote }}
            {{- end }}
            {{- if .Values.sandbox.hermes.glmApiKey }}
            - name: HERMES_GLM_API_KEY
              value: {{ .Values.sandbox.hermes.glmApiKey | quote }}
            {{- end }}
            {{- if .Values.sandbox.hermes.serviceAccountRoleArn }}
            - name: HERMES_SA_ROLE_ARN
              value: {{ .Values.sandbox.hermes.serviceAccountRoleArn | quote }}
            {{- end }}
            {{- if .Values.sandbox.hermes.whatsappAllowedUsers }}
            - name: HERMES_WHATSAPP_ALLOWED
              value: {{ join "," .Values.sandbox.hermes.whatsappAllowedUsers | quote }}
            {{- end }}
            {{- if .Values.sandbox.openclaw.whatsappAllowedUsers }}
            - name: OPENCLAW_WHATSAPP_ALLOWED
              value: {{ join "," .Values.sandbox.openclaw.whatsappAllowedUsers | quote }}
            {{- end }}
            {{- $skillCMs := list -}}
            {{- range $name, $skill := .Values.sandbox.skills -}}
              {{- if $skill.enabled -}}
                {{- $skillCMs = append $skillCMs (printf "%s=%s-skill-%s" $name $.Release.Name $name) -}}
              {{- end -}}
            {{- end -}}
            {{- if $skillCMs }}
            # Comma-separated <skillName>=<configMapName> pairs. The sandbox
            # manager parses this, replicates each ConfigMap into the
            # workspace namespace at sandbox-create time, and mounts the
            # files under /opt/data/skills/personal/<name>/ (hermes) or
            # /home/node/.openclaw/plugins/<name>/ (openclaw).
            - name: SANDBOX_SKILL_CONFIGMAPS
              value: {{ join "," $skillCMs | quote }}
            {{- end }}
            {{- if .Values.codexExecGateway.enabled }}
            - name: CODEX_EXEC_GATEWAY_URL
              value: "http://{{ .Release.Name }}-codex-exec-gateway.{{ .Release.Namespace }}.svc:{{ .Values.codexExecGateway.port }}"
            # serve.go reads this name (instead of CODEX_EXEC_GATEWAY_URL)
            # to wire ExecutorsClient — without it /api/workspaces/.../executors
            # returns []. Same URL, distinct name for clarity vs PUBLIC_HOST.
            - name: CODEX_EXEC_GATEWAY_INTERNAL_URL
              value: "http://{{ .Release.Name }}-codex-exec-gateway.{{ .Release.Namespace }}.svc:{{ .Values.codexExecGateway.port }}"
            {{- end }}
            {{- if .Values.codexAppGateway.enabled }}
            # REST base URL for /api/turns (codex routing path, e.g. WeChat).
            # Distinct from CODEX_EXEC_GATEWAY_URL above (which serves the
            # jupyter SDK). The /notebook/ws WS path was removed in chart
            # 0.61.0 along with the SDK transport switch.
            - name: CODEX_APP_GATEWAY_REST_URL
              value: {{ printf "http://%s-codex-app-gateway.%s.svc:%v" .Release.Name .Release.Namespace (int .Values.codexAppGateway.port) | quote }}
            - name: CODEX_INBOUND_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-codex-gateway
                  key: inbound-hmac-secret
            {{- end }}
            - name: IMBRIDGE_URL
              value: {{ printf "http://%s-imbridge.%s.svc:%v" .Release.Name .Release.Namespace (int .Values.imbridge.port) | quote }}
            {{- if .Values.internal.apiSecret }}
            - name: INTERNAL_API_SECRET
              value: {{ .Values.internal.apiSecret | quote }}
            {{- end }}
            {{- if .Values.playground.github.token }}
            - name: GITHUB_PROMOTE_TOKEN
              value: {{ .Values.playground.github.token | quote }}
            {{- end }}
            {{- if .Values.playground.github.repo }}
            - name: GITHUB_PROMOTE_REPO
              value: {{ .Values.playground.github.repo | quote }}
            {{- end }}
            {{- if .Values.playground.github.base }}
            - name: GITHUB_PROMOTE_BASE
              value: {{ .Values.playground.github.base | quote }}
            {{- end }}
            {{- if .Values.secretsPepper }}
            - name: SECRETS_PEPPER
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: secrets-pepper
                  optional: true
            {{- end }}
            - name: AGENTSERVER_OPERATIONS_RETENTION_DAYS
              value: {{ .Values.operations.retentionDays | quote }}
            {{- if .Values.codexExecGateway.publicHost }}
            - name: CODEX_EXEC_GATEWAY_PUBLIC_HOST
              value: {{ .Values.codexExecGateway.publicHost | quote }}
            {{- end }}
            {{- if .Values.codexAuth.enabled }}
            {{- /*
            CODEX_AUTH_ISSUER_URL is the public-facing issuer URL codex
            sees. It lives on its own subdomain (default
            codex-auth.<platform.domain>) routed through Gateway/Ingress
            to agentserver's /codex-auth/* mount. Operator can override
            the subdomain via codexAuth.externalHost.
            */}}
            {{- $codexAuthHost := .Values.codexAuth.externalHost }}
            {{- if not $codexAuthHost }}{{- $codexAuthHost = printf "codex-auth.%s" .Values.platform.domain }}{{- end }}
            - name: CODEX_AUTH_ISSUER_URL
              value: {{ printf "https://%s" $codexAuthHost | quote }}
            # CODEX_AUTH_HOST is the public Host header used on the
            # codex-auth subdomain. agentserver does an in-process
            # path rewrite (/foo → /codex-auth/foo) when it sees this
            # exact Host, because istio 1.30's Gateway-API URLRewrite
            # with PathPrefix `/` is a no-op (does not actually rewrite
            # paths). Doing the rewrite in Go avoids the istio bug.
            - name: CODEX_AUTH_HOST
              value: {{ $codexAuthHost | quote }}
            # Cookie Domain. When codexAuth is on, the session cookie
            # set by /api/auth/login on <platform.domain> must also be
            # readable on codex-auth.<platform.domain>, otherwise the
            # codex login flow's SessionResolve always sees no session.
            # ".<domain>" tells the browser to send the cookie to all
            # subdomains.
            - name: AGENTSERVER_COOKIE_DOMAIN
              value: {{ printf ".%s" .Values.platform.domain | quote }}
            {{- end }}
            - name: OPENCLAW_SUBDOMAIN_PREFIX
              value: {{ .Values.sandbox.openclaw.subdomainPrefix | default "claw" | quote }}
            - name: HERMES_SUBDOMAIN_PREFIX
              value: {{ .Values.sandbox.hermes.subdomainPrefix | default "hermes" | quote }}
            - name: LLMPROXY_URL
              value: {{ printf "http://%s-llmproxy.%s.svc:%v" .Release.Name .Release.Namespace (int .Values.llmproxy.port) | quote }}
            {{- if and .Values.platform.domain (or .Values.platform.auth.oidc.github.enabled .Values.platform.auth.oidc.generic.enabled) }}
            - name: OIDC_REDIRECT_BASE_URL
              value: {{ printf "https://%s" .Values.platform.domain | quote }}
            {{- end }}
            {{- if .Values.platform.auth.oidc.github.enabled }}
            - name: GITHUB_CLIENT_ID
              value: {{ .Values.platform.auth.oidc.github.clientId | quote }}
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: github-client-secret
            {{- if .Values.platform.auth.oidc.github.redirectBaseUrl }}
            - name: GITHUB_REDIRECT_BASE_URL
              value: {{ .Values.platform.auth.oidc.github.redirectBaseUrl | quote }}
            {{- end }}
            {{- if .Values.platform.auth.oidc.github.allowedDomains }}
            - name: GITHUB_ALLOWED_DOMAINS
              value: {{ .Values.platform.auth.oidc.github.allowedDomains | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.platform.auth.oidc.generic.allowedDomains }}
            - name: OIDC_ALLOWED_DOMAINS
              value: {{ .Values.platform.auth.oidc.generic.allowedDomains | quote }}
            {{- end }}
            {{- if .Values.modelserver.enabled }}
            - name: MODELSERVER_OAUTH_CLIENT_ID
              value: {{ .Values.modelserver.oauth.clientId | quote }}
            - name: MODELSERVER_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: modelserver-oauth-client-secret
            - name: MODELSERVER_OAUTH_AUTH_URL
              value: {{ .Values.modelserver.oauth.authUrl | quote }}
            - name: MODELSERVER_OAUTH_TOKEN_URL
              value: {{ .Values.modelserver.oauth.tokenUrl | quote }}
            - name: MODELSERVER_OAUTH_INTROSPECT_URL
              value: {{ .Values.modelserver.oauth.introspectUrl | quote }}
            - name: MODELSERVER_OAUTH_REDIRECT_URI
              value: {{ default (printf "https://%s/api/auth/modelserver/callback" .Values.platform.domain) .Values.modelserver.oauth.redirectUri | quote }}
            - name: MODELSERVER_PROXY_URL
              value: {{ .Values.modelserver.proxyUrl | quote }}
            {{- end }}
            {{- if .Values.hydra.enabled }}
            - name: HYDRA_ADMIN_URL
              value: {{ printf "http://%s-hydra-admin:%v" .Release.Name (int .Values.hydra.adminPort) | quote }}
            - name: HYDRA_PUBLIC_URL
              value: {{ printf "http://%s-hydra-public:%v" .Release.Name (int .Values.hydra.publicPort) | quote }}
            {{- end }}
            {{- if .Values.platform.auth.oidc.generic.enabled }}
            - name: OIDC_ISSUER_URL
              value: {{ .Values.platform.auth.oidc.generic.issuerUrl | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.platform.auth.oidc.generic.clientId | quote }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: oidc-client-secret
            {{- end }}
            {{- if .Values.credentialproxy.enabled }}
            - name: CREDPROXY_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: credproxy-encryption-key
            - name: CREDPROXY_PUBLIC_URL
              value: {{ printf "http://%s-credentialproxy.%s.svc:%v" .Release.Name .Release.Namespace (int .Values.credentialproxy.port) | quote }}
            {{- end }}

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          # On pod delete, sleep before the binary sees SIGTERM so kube
          # endpoints controller has time to remove this pod from the
          # Service backend list. Without this gap, in-flight requests
          # (notably codex-exec-gateway's /internal/codex-auth/validate
          # call) get RST'd mid-flight when the binary exits, surfacing
          # as 401 to codex which then exits its register loop. 10s
          # comfortably exceeds the worst-case endpoints propagation.
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
      terminationGracePeriodSeconds: 30
{{- if not .Values.externalDatabase.existingSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secret
type: Opaque
stringData:
  database-url: {{ include "agentserver.databaseUrl" . | quote }}
  anthropic-api-key: {{ .Values.models.anthropicApiKey | quote }}
  anthropic-base-url: {{ .Values.models.anthropicBaseUrl | quote }}
  anthropic-auth-token: {{ .Values.models.anthropicAuthToken | quote }}
  gemini-api-key: {{ .Values.models.geminiApiKey | quote }}
  {{- if .Values.platform.auth.oidc.github.enabled }}
  github-client-secret: {{ .Values.platform.auth.oidc.github.clientSecret | quote }}
  {{- end }}
  {{- if .Values.platform.auth.oidc.generic.enabled }}
  oidc-client-secret: {{ .Values.platform.auth.oidc.generic.clientSecret | quote }}
  {{- end }}
  {{- if .Values.modelserver.enabled }}
  modelserver-oauth-client-secret: {{ .Values.modelserver.oauth.clientSecret | quote }}
  {{- end }}
  {{- if .Values.credentialproxy.enabled }}
  credproxy-encryption-key: {{ .Values.credentialproxy.encryptionKey | quote }}
  {{- end }}
  {{- if .Values.secretsPepper }}
  secrets-pepper: {{ .Values.secretsPepper | quote }}
  {{- end }}
{{- else }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secret
type: Opaque
stringData:
  anthropic-api-key: {{ .Values.models.anthropicApiKey | quote }}
  anthropic-base-url: {{ .Values.models.anthropicBaseUrl | quote }}
  anthropic-auth-token: {{ .Values.models.anthropicAuthToken | quote }}
  gemini-api-key: {{ .Values.models.geminiApiKey | quote }}
  {{- if .Values.platform.auth.oidc.github.enabled }}
  github-client-secret: {{ .Values.platform.auth.oidc.github.clientSecret | quote }}
  {{- end }}
  {{- if .Values.platform.auth.oidc.generic.enabled }}
  oidc-client-secret: {{ .Values.platform.auth.oidc.generic.clientSecret | quote }}
  {{- end }}
  {{- if .Values.modelserver.enabled }}
  modelserver-oauth-client-secret: {{ .Values.modelserver.oauth.clientSecret | quote }}
  {{- end }}
  {{- if .Values.credentialproxy.enabled }}
  credproxy-encryption-key: {{ .Values.credentialproxy.encryptionKey | quote }}
  {{- end }}
  {{- if .Values.secretsPepper }}
  secrets-pepper: {{ .Values.secretsPepper | quote }}
  {{- end }}
{{- end }}
