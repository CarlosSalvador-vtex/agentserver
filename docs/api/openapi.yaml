servers:
  - url: /
components:
  requestBodies:
    AuthCredentials:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AuthCredentials"
      description: Email and password
      required: true
    AgentTaskCreateRequest:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AgentTaskCreateRequest"
      description: Task details
      required: true
  securitySchemes:
    CookieAuth:
      description: Session cookie set by POST /api/auth/login. All non-auth endpoints
        assume this cookie.
      in: cookie
      name: agentserver-token
      type: apiKey
  schemas:
    APIKeyScopeDescriptor:
      properties:
        available:
          type: boolean
        description:
          type: string
        name:
          example: turns:submit
          type: string
      required:
        - available
        - description
        - name
      type: object
    AdminOwnerInfo:
      properties:
        email:
          type: string
        id:
          type: string
        name:
          type: string
          nullable: true
        picture:
          type: string
          nullable: true
      required:
        - email
        - id
      type: object
    AdminQuotaDefaultsResponse:
      properties:
        max_idle_timeout:
          type: integer
        max_sandbox_cpu:
          type: integer
        max_sandbox_memory:
          type: integer
        max_sandboxes_per_workspace:
          type: integer
        max_workspace_drive_size:
          type: integer
        max_workspaces_per_user:
          type: integer
        ws_max_idle_timeout:
          type: integer
        ws_max_total_cpu:
          type: integer
        ws_max_total_memory:
          type: integer
      required:
        - max_idle_timeout
        - max_sandbox_cpu
        - max_sandbox_memory
        - max_sandboxes_per_workspace
        - max_workspace_drive_size
        - max_workspaces_per_user
        - ws_max_idle_timeout
        - ws_max_total_cpu
        - ws_max_total_memory
      type: object
    AdminQuotaDefaultsUpdateRequest:
      properties:
        max_idle_timeout:
          type: integer
        max_sandbox_cpu:
          type: integer
        max_sandbox_memory:
          type: integer
        max_sandboxes_per_workspace:
          type: integer
        max_workspace_drive_size:
          type: integer
        max_workspaces_per_user:
          type: integer
        ws_max_idle_timeout:
          type: integer
        ws_max_total_cpu:
          type: integer
        ws_max_total_memory:
          type: integer
      type: object
    AdminSandboxItem:
      properties:
        created_at:
          type: string
        id:
          type: string
        is_local:
          type: boolean
        last_activity_at:
          type: string
          nullable: true
        name:
          type: string
        status:
          example: running
          type: string
        type:
          example: openclaw
          type: string
        workspace_id:
          type: string
      required:
        - created_at
        - id
        - name
        - status
        - type
        - workspace_id
      type: object
    AdminSetUserQuotaRequest:
      properties:
        max_workspaces:
          type: integer
          nullable: true
      type: object
    AdminSetWorkspaceQuotaRequest:
      properties:
        max_drive_size:
          type: integer
          nullable: true
        max_idle_timeout:
          type: integer
          nullable: true
        max_sandbox_cpu:
          type: integer
          nullable: true
        max_sandbox_memory:
          type: integer
          nullable: true
        max_sandboxes:
          type: integer
          nullable: true
        max_total_cpu:
          type: integer
          nullable: true
        max_total_memory:
          type: integer
          nullable: true
