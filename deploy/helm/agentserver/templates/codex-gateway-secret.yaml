{{- if or .Values.codexAppGateway.enabled .Values.codexExecGateway.enabled }}
{{- /*
Shared secret used by codex-app-gateway AND codex-exec-gateway.

Keys:
- inbound-hmac-secret    : app-gw verifies inbound TUI bearer tokens against this
- cap-token-hmac-secret  : app-gw mints per-turn cap tokens; exec-gw verifies
- internal-shared-secret : app-gw uses as Bearer when calling exec-gw's
                           /api/exec-gateway/* internal API

Auto-generated on first install if no override is supplied. On upgrade we
preserve previously-generated values via lookup() so the two pods stay in
sync without operator intervention.
*/}}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace (printf "%s-codex-gateway" .Release.Name)) }}
{{- $inbound := default "" .Values.codexGateway.inboundHmacSecret }}
{{- $captok  := default "" .Values.codexGateway.capTokenHmacSecret }}
{{- $intern  := default "" .Values.codexGateway.internalSharedSecret }}
{{- if and (not $inbound) $existing }}{{- $inbound = (index $existing.data "inbound-hmac-secret" | b64dec) }}{{- end }}
{{- if and (not $captok)  $existing }}{{- $captok  = (index $existing.data "cap-token-hmac-secret" | b64dec) }}{{- end }}
{{- if and (not $intern)  $existing }}{{- $intern  = (index $existing.data "internal-shared-secret" | b64dec) }}{{- end }}
{{- if not $inbound }}{{- $inbound = randAlphaNum 48 }}{{- end }}
{{- if not $captok  }}{{- $captok  = randAlphaNum 48 }}{{- end }}
{{- if not $intern  }}{{- $intern  = randAlphaNum 48 }}{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-codex-gateway
  labels:
    app: {{ .Release.Name }}-codex-gateway
type: Opaque
stringData:
  inbound-hmac-secret: {{ $inbound | quote }}
  cap-token-hmac-secret: {{ $captok | quote }}
  internal-shared-secret: {{ $intern | quote }}
{{- end }}
