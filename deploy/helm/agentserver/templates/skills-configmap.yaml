{{- /*
Renders one ConfigMap per enabled entry in .Values.sandbox.skills. Each skill
ConfigMap is multi-key — the assets live under deploy/helm/agentserver/skills/<name>/
and are inlined via .Files.Get during chart render.

ConfigMap data keys cannot contain "/" (K8s rule: [A-Za-z0-9_.-]). Nested files
are stored with "__" as the slash separator (e.g. "references__leads.json").
The sandbox manager translates "__" back to "/" when building the volume
mount items[].path so the on-disk layout under the mount point still nests
references/ correctly.

Manager replicates each ConfigMap into every workspace namespace at sandbox
create time and mounts:
  - hermes:   /opt/data/skills/personal/<name>/<file>     (per-file subPath)
  - openclaw: /home/node/.openclaw/plugins/<name>/<file>  (per-file subPath)
*/ -}}
{{- range $name, $skill := .Values.sandbox.skills }}
{{- if $skill.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $.Release.Name }}-skill-{{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/name: agentserver
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/component: skill
    agentserver.io/skill: {{ $name | quote }}
data:
  {{- $prefix := printf "skills/%s/" $name }}
  {{- range $path, $_ := $.Files.Glob (printf "%s**" $prefix) }}
  {{- $rel := trimPrefix $prefix $path }}
  {{- $key := replace "/" "__" $rel }}
  {{ $key | quote }}: |
{{ $.Files.Get $path | indent 4 }}
  {{- end }}
{{- end }}
{{- end }}
