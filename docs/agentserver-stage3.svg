<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1180" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
    <style>
      .title { font-size: 44px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-size: 22px; fill: #64748b; font-style: italic; }
      .box { fill: #ffffff; stroke: #475569; stroke-width: 1.5; rx: 8; }
      .boxNew { fill: #ecfdf5; stroke: #16a34a; stroke-width: 2; rx: 8; }
      .boxNewRed { fill: #fef2f2; stroke: #dc2626; stroke-width: 2.5; rx: 8; }
      .boxClient { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.5; rx: 8; }
      .boxControl { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; rx: 8; }
      .boxData { fill: #f3e8ff; stroke: #9333ea; stroke-width: 1.5; rx: 8; }
      .boxExt { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.5; stroke-dasharray: 5,3; rx: 8; }
      .boxLabel { font-size: 22px; font-weight: 600; fill: #0f172a; text-anchor: middle; }
      .boxLabelSmall { font-size: 18px; fill: #475569; text-anchor: middle; }
      .boxLabelTiny { font-size: 16px; fill: #64748b; text-anchor: middle; }
      .arrow { stroke: #475569; stroke-width: 1.5; fill: none; }
      .arrowGreen { stroke: #16a34a; stroke-width: 2; fill: none; }
      .arrowRed { stroke: #dc2626; stroke-width: 2; fill: none; }
      .arrowLabel { font-size: 17px; fill: #64748b; text-anchor: middle; }
      .arrowLabelRed { font-size: 17px; fill: #dc2626; text-anchor: middle; font-weight: 600; }
      .badge { fill: #16a34a; rx: 4; }
      .badgeRed { fill: #dc2626; rx: 4; }
      .badgeText { font-size: 14px; font-weight: 700; fill: #ffffff; text-anchor: middle; }
      .legend { font-size: 17px; fill: #475569; }
    </style>
  </defs>

  <!-- Header -->
  <text x="800" y="50" class="title" text-anchor="middle">Stage 3 · Centralized Agent-Loop</text>
  <text x="800" y="80" class="subtitle" text-anchor="middle">cc-broker absorbs the loop · sandboxes become stateless workers · MCP ToolRouter unifies tool dispatch</text>

  <!-- Legend -->
  <g transform="translate(40, 90)">
    <rect x="0" y="0" width="14" height="14" class="boxClient"/><text x="22" y="11" class="legend">Client</text>
    <rect x="80" y="0" width="14" height="14" class="boxControl"/><text x="102" y="11" class="legend">Control</text>
    <rect x="170" y="0" width="14" height="14" class="box"/><text x="192" y="11" class="legend">Service</text>
    <rect x="255" y="0" width="14" height="14" class="boxData"/><text x="277" y="11" class="legend">Data</text>
    <rect x="335" y="0" width="14" height="14" class="boxExt"/><text x="357" y="11" class="legend">External</text>
    <rect x="425" y="0" width="14" height="14" class="boxNew"/><text x="447" y="11" class="legend">New in Stage 3</text>
    <rect x="555" y="0" width="14" height="14" class="boxNewRed"/><text x="577" y="11" class="legend">Major architectural shift</text>
  </g>

  <!-- ===== Top row: Clients (5 boxes evenly spaced) ===== -->
  <rect x="60" y="140" width="200" height="65" class="boxClient"/>
  <text x="160" y="170" class="boxLabel">Browser / WebUI</text>
  <text x="160" y="190" class="boxLabelSmall">workspaces · sandboxes</text>

  <rect x="290" y="140" width="200" height="65" class="boxClient"/>
  <text x="390" y="170" class="boxLabel">IM Users</text>
  <text x="390" y="190" class="boxLabelSmall">WeChat · TG · Matrix</text>

  <rect x="520" y="140" width="240" height="75" class="boxNew"/>
  <text x="640" y="173" class="boxLabel">External API caller</text>
  <text x="640" y="198" class="boxLabelSmall">POST /api/turns</text>

  <rect x="790" y="140" width="240" height="75" class="boxNew"/>
  <text x="910" y="173" class="boxLabel">Other Agents (a2a)</text>
  <text x="910" y="198" class="boxLabelSmall">agent_cards · discovery</text>

  <rect x="1060" y="140" width="320" height="75" class="boxClient"/>
  <text x="1220" y="173" class="boxLabel">Local agents (via tunnel)</text>
  <text x="1220" y="198" class="boxLabelSmall">agentserver-agent · WSS yamux</text>

  <!-- ===== agentserver control plane (wide bar) ===== -->
  <rect x="60" y="260" width="1320" height="100" class="boxControl"/>
  <text x="720" y="293" class="boxLabel">agentserver  (control plane)</text>
  <text x="720" y="320" class="boxLabelSmall">workspaces · sandboxes · auth · webhook ingress · tunnel registry · sandbox lifecycle</text>
  <text x="720" y="342" class="boxLabelSmall">REST: /api/{auth, workspaces, sandboxes, agent/tasks, credentials}</text>

  <!-- ===== Mid services row (4 boxes) ===== -->
  <!-- Sandbox Pods rendered as stacked cards = worker pool of N -->
  <rect x="80" y="420" width="300" height="135" class="box" opacity="0.35"/>
  <rect x="70" y="410" width="300" height="135" class="box" opacity="0.65"/>
  <rect x="60" y="400" width="300" height="135" class="box"/>
  <text x="210" y="432" class="boxLabel">Sandbox Pods  (×N)</text>
  <text x="210" y="455" class="boxLabelSmall" font-style="italic">now WORKERS (no loop)</text>
  <rect x="80" y="468" width="260" height="55" class="box"/>
  <text x="210" y="492" class="boxLabel">CC Worker</text>
  <text x="210" y="513" class="boxLabelSmall">stateless · executes actions</text>

  <rect x="400" y="400" width="260" height="135" class="box"/>
  <text x="530" y="432" class="boxLabel">IM Bridge</text>
  <text x="530" y="458" class="boxLabelSmall">inbound IM →</text>
  <text x="530" y="478" class="boxLabelSmall">resolve session</text>
  <text x="530" y="500" class="boxLabelSmall">outbound: send_message /</text>
  <text x="530" y="518" class="boxLabelSmall">image / file</text>

  <rect x="680" y="400" width="320" height="135" class="boxNew"/>
  <text x="840" y="432" class="boxLabel">executor-registry</text>
  <text x="840" y="458" class="boxLabelSmall">long-lived executor registry</text>
  <text x="840" y="478" class="boxLabelSmall">heartbeat · discovery</text>
  <text x="840" y="498" class="boxLabelSmall">POST /api/execute</text>
  <text x="840" y="518" class="boxLabelSmall">K8s sidecar / local / remote</text>

  <rect x="1040" y="400" width="340" height="135" class="boxData"/>
  <text x="1210" y="432" class="boxLabel">PostgreSQL</text>
  <text x="1210" y="458" class="boxLabelSmall">sessions · events · workers</text>
  <text x="1210" y="478" class="boxLabelSmall">agent_cards · executors</text>
  <text x="1210" y="498" class="boxLabelSmall">credential_bindings</text>
  <text x="1210" y="518" class="boxLabelSmall">workspace_quotas</text>

  <!-- ===== cc-broker (highlighted) ===== -->
  <rect x="100" y="640" width="1280" height="280" class="boxNewRed"/>
  <text x="740" y="685" class="boxLabel" font-size="26">cc-broker  :8085</text>
  <rect x="640" y="654" width="200" height="26" class="badgeRed"/>
  <text x="740" y="673" class="badgeText" font-size="14">★ MAJOR SHIFT ★</text>

  <!-- inner: agent loop -->
  <rect x="140" y="700" width="1200" height="80" fill="#ffffff" stroke="#dc2626" stroke-width="1.5" rx="6"/>
  <text x="740" y="732" class="boxLabel" fill="#dc2626">★ AGENT LOOP LIVES HERE NOW ★</text>
  <text x="740" y="758" class="boxLabelSmall">Sessions · Workers · SSE broker · Turn lock · Dedup · OpenViking file transfer</text>

  <!-- inner: MCP + ToolRouter -->
  <rect x="140" y="795" width="1200" height="115" fill="#ffffff" stroke="#dc2626" stroke-width="1.5" rx="6"/>
  <text x="740" y="825" class="boxLabel">MCP Server  +  ToolRouter</text>
  <text x="740" y="850" class="boxLabelSmall">workspace_*  →  workspace fs (via OpenViking)        |        remote_*  →  executor-registry</text>
  <text x="740" y="872" class="boxLabelSmall">send_message / send_image  →  IM Bridge        |        schedule_*  →  scheduling backend</text>
  <text x="740" y="895" class="boxLabelTiny" font-style="italic">tool dispatch is centralized — no longer hardcoded in the agent process</text>

  <!-- ===== Bottom: llmproxy + external ===== -->
  <rect x="140" y="970" width="380" height="100" class="boxNew"/>
  <text x="330" y="1004" class="boxLabel">llmproxy  :8081</text>
  <text x="330" y="1028" class="boxLabelSmall">quotas · usage tracking</text>
  <text x="330" y="1050" class="boxLabelSmall">token injection (per workspace)</text>

  <rect x="580" y="970" width="320" height="100" class="boxExt"/>
  <text x="740" y="1004" class="boxLabel">Anthropic / Gemini</text>
  <text x="740" y="1028" class="boxLabelSmall">real LLM providers</text>

  <!-- ============== Arrows (all orthogonal) ============== -->

  <!-- Clients → agentserver (each straight down) -->
  <path d="M 160,215 V 260" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 390,215 V 260" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 640,215 V 260" class="arrowGreen" marker-end="url(#arrowGreen)"/>
  <path d="M 910,215 V 260" class="arrowGreen" marker-end="url(#arrowGreen)"/>
  <path d="M 1220,215 V 260" class="arrow" marker-end="url(#arrow)"/>

  <!-- agentserver → mid services (straight down to each) -->
  <path d="M 210,360 V 400" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 530,360 V 400" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 840,360 V 400" class="arrowGreen" marker-end="url(#arrowGreen)"/>
  <path d="M 1210,360 V 400" class="arrow" marker-end="url(#arrow)"/>

  <!-- Mid services → cc-broker (each straight down to top of cc-broker box at y=640) -->
  <path d="M 210,535 V 640" class="arrowRed" marker-end="url(#arrowRed)"/>
  <text x="265" y="590" class="arrowLabelRed">SSE / events</text>

  <path d="M 530,535 V 640" class="arrowRed" marker-end="url(#arrowRed)"/>
  <text x="575" y="590" class="arrowLabelRed">tool calls</text>

  <path d="M 840,535 V 640" class="arrowRed" marker-end="url(#arrowRed)"/>
  <text x="880" y="590" class="arrowLabelRed">execute</text>

  <!-- cc-broker → PostgreSQL (straight up — persist) -->
  <path d="M 1210,640 V 535" class="arrow" marker-end="url(#arrow)" stroke-dasharray="3,3"/>
  <text x="1255" y="590" class="arrowLabel">persist</text>

  <!-- cc-broker → llmproxy (straight down) -->
  <path d="M 330,920 V 970" class="arrow" marker-end="url(#arrow)"/>
  <text x="380" y="950" class="arrowLabel">LLM call</text>

  <!-- llmproxy → external LLM (horizontal right) -->
  <path d="M 520,1020 H 580" class="arrow" marker-end="url(#arrow)"/>

  <!-- Footer -->
  <text x="800" y="1140" font-size="16" fill="#475569" text-anchor="middle" font-style="italic">
    The thinking moves out of the container. Sandboxes become hands; cc-broker becomes the brain. Tools are dispatched, not imported.
  </text>
</svg>
