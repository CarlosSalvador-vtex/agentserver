replicaCount: 1

image:
  # Fork namespace (was ghcr.io/agentserver/* upstream — no push access).
  # Must match .github/workflows/build.yml IMAGE_NS. See docs/ops/ci-ghcr-namespace-blocker.md
  repository: ghcr.io/carlossalvador-vtex/agentserver
  tag: latest
  pullPolicy: Always

postgresql:
  enabled: true
  image:
    repository: registry.nj.cs.ac.cn/dockerhub/postgres
    tag: "18-alpine"
    pullPolicy: IfNotPresent
  auth:
    username: agentserver
    password: agentserver
    database: agentserver
  primary:
    persistence:
      enabled: true
      size: 10Gi
      storageClass: "csi-rbd-sc"
    resources: {}

externalDatabase:
  host: ""
  port: 5432
  user: ""
  password: ""
  database: ""
  sslmode: disable
  # Raw connection URL (overrides individual fields above)
  url: ""
  # Existing K8s secret with a "database-url" key (overrides everything above)
  existingSecret: ""

externalSecrets:
  enabled: false
  # IAM role ARN for the agentserver-external-secrets ServiceAccount (IRSA)
  roleArn: ""
  region: us-east-1
  secrets:
    agentserver: "prd/rds/k8s-metadata-instance/agentserver"
    hydra: "prd/rds/k8s-metadata-instance/agentserver-hydra"
    llmproxy: "prd/rds/k8s-metadata-instance/agentserver-llmproxy"

sealedSecrets:
  # Set to true to deploy SealedSecret resources (requires Sealed Secrets controller in cluster).
  # SealedSecret YAMLs in templates/sealed-secret-*.yaml are cluster+namespace-bound —
  # re-encrypt with kubeseal if migrating to a different cluster.
  enabled: false

models:
  anthropicApiKey: ""
  anthropicBaseUrl: ""
  anthropicAuthToken: ""
  geminiApiKey: ""

platform:
  # Domain for the platform web UI (e.g. "platform.agentserver.dev").
  # Used for OIDC redirect URLs (auto-derived as https://<domain>).
  domain: ""
  defaultQuotas:
    userMaxWorkspaces: 10
    workspaceMaxSandboxes: 20
    maxSandboxCpu: 2000            # millicores (2000 = 2 cores)
    maxSandboxMemory: 2147483648   # bytes (2Gi)
    maxWorkspaceDriveSize: 10737418240  # bytes (10Gi)
    workspaceMaxTotalCpu: 0        # millicores, 0 = unlimited
    workspaceMaxTotalMemory: 0     # bytes, 0 = unlimited
    workspaceMaxIdleTimeout: 0     # seconds, 0 = unlimited
  auth:
    password:
      enabled: true
    oidc:
      github:
        enabled: false
        clientId: ""
        clientSecret: ""
        # Override OAuth callback base URL (defaults to https://<platform.domain>).
        redirectBaseUrl: ""
        # Comma-separated base domains where GitHub login is shown (empty = all domains).
        allowedDomains: ""
      generic:
        enabled: false
        issuerUrl: ""
        clientId: ""
        clientSecret: ""
        # Comma-separated base domains where SSO login is shown (empty = all domains).
        allowedDomains: ""

sandbox:
  # Base domain for subdomain-based sandbox routing (e.g. "agentserver.dev").
  # Each sandbox gets a subdomain: {prefix}-{sessionID}.{baseDomain}
  baseDomain: ""
  # Additional base domains for multi-domain support (e.g. ["agent.cs.ac.cn"]).
  # Sandbox subdomains will be accessible on all configured domains.
  additionalBaseDomains: []
  # Prefix for per-workspace K8s namespaces (e.g. "agent-ws" → "agent-ws-a1b2c3d4").
  namespacePrefix: "agent-ws"
  # StorageClass for sandbox session volumes (empty = cluster default).
  sessionStorageClassName: ""
  # StorageClass for workspace drive PVCs (empty = falls back to sessionStorageClassName).
  workspaceStorageClassName: ""
  # Size of the session PVC for each sandbox pod.
  sessionStorageSize: "5Gi"
  # LLM proxy config injected as OPENCODE_CONFIG_CONTENT for openclaw/hermes sandboxes.
  llmProxyConfig: {}

  openclaw:
    image: ""
    runtimeClassName: ""
    subdomainPrefix: "claw"  # subdomain: {prefix}-{sessionID}.{baseDomain}
    weixinEnabled: false     # Install and enable the official WeChat channel plugin
    # WhatsApp allowlist (E.164 phone numbers). When non-empty, the openclaw
    # config injection sets channels.whatsapp.allowFrom and enables the
    # bundled "whatsapp" plugin.
    whatsappAllowedUsers: []
  hermes:
    image: ""                # e.g. ghcr.io/nousresearch/hermes-agent:latest
    runtimeClassName: ""
    subdomainPrefix: "hermes" # subdomain: {prefix}-{sandboxID}.{baseDomain}
    # WhatsApp allowlist (E.164). Injected as WHATSAPP_ALLOWED_USERS env in
    # the hermes pod; first-time pairing via dashboard QR.
    whatsappAllowedUsers: []
    # IRSA role ARN to attach to the auto-created "hermes" ServiceAccount in
    # each workspace namespace (gives the sandbox pod Bedrock access).
    serviceAccountRoleArn: ""
    # GLM_API_KEY env var (used by zai/glm-5.1 fallback provider when config.yaml
    # configures it as a fallback). Optional.
    glmApiKey: ""
    # Inline hermes config.yaml content. When set, a ConfigMap is created in the
    # release namespace and replicated into each workspace namespace, then mounted
    # as /home/agent/.hermes/config.yaml inside the sandbox pod so the agent
    # skips the interactive first-run wizard.
    config: ""
  networkPolicy:
    enabled: false
    # CIDR ranges to deny egress to (internal/private networks).
    denyCIDRs: []
  # Custom skills delivered into every sandbox pod via ConfigMap-mount.
  # Files live under deploy/helm/agentserver/skills/<name>/ in the chart;
  # the skills-configmap.yaml template emits one ConfigMap per enabled
  # entry, and the agentserver replicates each into the workspace
  # namespace at sandbox-create time. Mount paths per platform:
  #   hermes:   /opt/data/skills/personal/<name>/<file>
  #   openclaw: /home/node/.openclaw/plugins/<name>/<file>
  skills: {}
  # Example:
  # skills:
  #   cobranca:
  #     enabled: true
  #     platforms: [hermes, openclaw]   # informational; mounts always happen

agentSandbox:
  # Set to false to skip installing the agent-sandbox controller (if already installed cluster-wide)
  install: true
  controllerImage: registry.k8s.io/agent-sandbox/agent-sandbox-controller:v0.1.1

hydra:
  # Ory Hydra OAuth2 server for agent Device Flow registration.
  # When enabled, deploys Hydra alongside agentserver and configures
  # the agentserver as Hydra's login/consent provider.
  enabled: false
  image:
    repository: oryd/hydra
    tag: "v26.2.0"
    pullPolicy: IfNotPresent
  publicPort: 4444
  adminPort: 4445
  database:
    # Database name created on the shared PostgreSQL instance.
    name: hydra
    # Set to use an external database instead of the shared PostgreSQL.
    externalDsn: ""
  # System secret for cookie/token encryption (32+ chars, auto-generated if empty).
  secretsSystem: ""
  # Device Flow polling interval.
  deviceAuthTokenPollingInterval: "5s"

modelserver:
  # Connect workspaces to a ModelServer project via OAuth 2.0 (Hydra).
  # When enabled, sandbox LLM traffic routes through llmproxy → ModelServer.
  enabled: false
  oauth:
    clientId: ""
    clientSecret: ""
    authUrl: ""        # Hydra public authorization endpoint (e.g. https://codeapi.cs.ac.cn/oauth2/auth)
    tokenUrl: ""       # Hydra public token endpoint (e.g. https://codeapi.cs.ac.cn/oauth2/token)
    introspectUrl: ""  # Hydra admin introspection endpoint (e.g. http://hydra:4445/admin/oauth2/introspect)
    redirectUri: ""    # OAuth callback URL (auto-derived as https://<platform.domain>/api/auth/modelserver/callback if blank)
  proxyUrl: ""         # ModelServer LLM proxy URL (e.g. https://code.ai.cs.ac.cn)

llmproxy:
  # LLM proxy for token usage tracking and request tracing.
  # The proxy baseURL is auto-injected into sandbox OPENCODE_CONFIG_CONTENT.
  image:
    repository: ghcr.io/carlossalvador-vtex/llmproxy
    tag: latest
    pullPolicy: Always
  # Number of llmproxy replicas (defaults to global replicaCount if not set).
  replicaCount: 1
  # LLM proxy listens on this port inside the container.
  port: 8081
  # LLM proxy uses the same PostgreSQL instance by default (separate database "llmproxy").
  # Set externalDatabaseUrl to use a different database.
  database:
    # Database name created on the shared PostgreSQL instance.
    name: llmproxy
  externalDatabaseUrl: ""
  # Default max requests per day per workspace (0 = unlimited).
  defaultMaxRpd: 0

imbridge:
  image:
    repository: ghcr.io/carlossalvador-vtex/imbridge
    tag: latest
    pullPolicy: Always
  port: 8083

sandboxProxy:
  image:
    repository: ghcr.io/carlossalvador-vtex/sandboxproxy
    tag: latest
    pullPolicy: Always
  replicaCount: 1
  port: 8082

credentialproxy:
  # Credential proxy for secure external API access from sandboxes.
  # When enabled, sandboxes can use user-uploaded kubeconfigs to access
  # external k8s clusters without seeing the real credentials.
  enabled: false
  image:
    repository: ghcr.io/carlossalvador-vtex/credentialproxy
    tag: latest
    pullPolicy: Always
  replicaCount: 1
  port: 8083
  logLevel: info
  # 32-byte AES-256 key (base64 or hex encoded). Required when enabled.
  # Both agentserver and credentialproxy must share the same key.
  encryptionKey: ""
  # Override database URL (defaults to shared agentserver database).
  externalDatabaseUrl: ""

# Shared secret used on all internal service-to-service calls:
#   agentserver → imbridge, imbridge → agentserver, cc-broker → imbridge.
# When empty, internal endpoints fall open (no auth); set this in production.
internal:
  apiSecret: ""

# Playground — promote draft → git PR (see docs/playground-design.md §7).
# When token is empty, the promote endpoint returns 503 — useful for dev
# clusters where authoring matters but git pushes shouldn't fire.
playground:
  github:
    token: ""                                  # PAT with "repo" scope
    repo: "CarlosSalvador-vtex/agentserver"    # default; override per env
    base: "main"

# WhatsApp Cloud (Meta) integration.
# webhookVerifyToken: shared secret for the GET /webhook/whatsapp handshake
#   (must match Meta App Dashboard → Webhooks → Verify Token).
# appSecret: Meta App Secret used to verify the X-Hub-Signature-256 header on
#   every webhook POST. PRODUCTION MUST SET THIS — empty disables signature
#   verification, which is dev-only behavior.
# hmacRequired: when true, the imbridge webhook handler refuses to process any
#   delivery while appSecret is empty (returns 503). Default false preserves
#   dev-mode opt-in behavior. PRODUCTION SHOULD SET TO true. See
#   improvements.md #13.
whatsapp:
  webhookVerifyToken: ""
  appSecret: ""
  hmacRequired: false

# HMAC pepper for workspace API key storage hashes (SECRETS_PEPPER env var).
# Set to a 32-byte random hex string; generate with: openssl rand -hex 32
# When empty, agentserver falls back to plain SHA-256 (dev-only; set in prod).
# WARNING: rotating this value invalidates all existing workspace API keys —
# all API key holders must re-mint after a pepper change.
secretsPepper: ""

# Operation audit log retention (agentserver /internal/operations).
operations:
  retentionDays: 90
  channelCapacity: 1024

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: nginx
  host: agentserver.example.com
  tls: false

gateway:
  enabled: false
  parentRefs:
    - name: cilium-gateway
      namespace: cilium-gateway
  host: agentserver.example.com

