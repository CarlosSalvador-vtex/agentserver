{{- if .Values.ingress.enabled }}
{{- /*
Resolve the codex gateway hostnames once. Default to subdomains of the
main ingress host so a single wildcard cert (or a SAN cert from
cert-manager) can cover everything.
*/}}
{{- $codexAppHost := .Values.codexAppGateway.externalHost }}
{{- if and .Values.codexAppGateway.enabled (not $codexAppHost) }}{{- $codexAppHost = printf "codex-app.%s" .Values.ingress.host }}{{- end }}
{{- $codexExecHost := .Values.codexExecGateway.externalHost }}
{{- if and .Values.codexExecGateway.enabled (not $codexExecHost) }}{{- $codexExecHost = printf "codex-exec.%s" .Values.ingress.host }}{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}
  annotations:
    {{- if .Values.ingress.tls }}
    cert-manager.io/cluster-issuer: letsencrypt-prod
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
        {{- if .Values.sandbox.baseDomain }}
        - {{ printf "*.%s" .Values.sandbox.baseDomain | quote }}
        {{- end }}
        {{- range .Values.sandbox.additionalBaseDomains }}
        - {{ printf "*.%s" . | quote }}
        {{- end }}
        {{- if .Values.codexAppGateway.enabled }}
        - {{ $codexAppHost | quote }}
        {{- end }}
        {{- if .Values.codexExecGateway.enabled }}
        - {{ $codexExecHost | quote }}
        {{- end }}
      secretName: {{ .Release.Name }}-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}
                port:
                  number: {{ .Values.service.port }}
    {{- if .Values.sandbox.baseDomain }}
    - host: {{ printf "*.%s" .Values.sandbox.baseDomain | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-sandboxproxy
                port:
                  number: {{ .Values.sandboxProxy.port }}
    {{- end }}
    {{- range .Values.sandbox.additionalBaseDomains }}
    - host: {{ printf "*.%s" . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $.Release.Name }}-sandboxproxy
                port:
                  number: {{ $.Values.sandboxProxy.port }}
    {{- end }}
    {{- if .Values.codexAppGateway.enabled }}
    - host: {{ $codexAppHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-codex-app-gateway
                port:
                  number: {{ .Values.codexAppGateway.port }}
    {{- end }}
    {{- if .Values.codexExecGateway.enabled }}
    - host: {{ $codexExecHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-codex-exec-gateway
                port:
                  number: {{ .Values.codexExecGateway.port }}
    {{- end }}
{{- end }}
