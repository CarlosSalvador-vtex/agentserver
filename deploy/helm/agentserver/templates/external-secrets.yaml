{{- if .Values.externalSecrets.enabled }}
# ServiceAccount used by External Secrets Operator to assume the IRSA role
# and read from AWS Secrets Manager on behalf of this namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentserver-external-secrets
  namespace: {{ .Release.Namespace }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.externalSecrets.roleArn | quote }}
---
# SecretStore scoped to this namespace — uses the ServiceAccount above.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: agentserver-aws-secrets
  namespace: {{ .Release.Namespace }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.externalSecrets.region | default "us-east-1" }}
      auth:
        jwt:
          serviceAccountRef:
            name: agentserver-external-secrets
---
# agentserver main DB secret (key: database-url)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agentserver-db-secret
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: agentserver-aws-secrets
    kind: SecretStore
  target:
    name: agentserver-db-secret
    creationPolicy: Owner
  data:
    - secretKey: database-url
      remoteRef:
        key: {{ .Values.externalSecrets.secrets.agentserver }}
        property: database-url
---
# Hydra DB secret (key: dsn)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agentserver-hydra-db-secret
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: agentserver-aws-secrets
    kind: SecretStore
  target:
    name: agentserver-hydra-db-secret
    creationPolicy: Owner
  data:
    - secretKey: dsn
      remoteRef:
        key: {{ .Values.externalSecrets.secrets.hydra }}
        property: dsn
---
# llmproxy DB secret (key: database-url, remapped from SM key "dsn")
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agentserver-llmproxy-db-secret
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: agentserver-aws-secrets
    kind: SecretStore
  target:
    name: agentserver-llmproxy-db-secret
    creationPolicy: Owner
  data:
    - secretKey: database-url
      remoteRef:
        key: {{ .Values.externalSecrets.secrets.llmproxy }}
        property: dsn
{{- end }}
