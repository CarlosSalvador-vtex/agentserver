<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 2400" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
    <style>
      .title { font-size: 32px; font-weight: 700; fill: #0f172a; }
      .stageTitle { font-size: 24px; font-weight: 700; fill: #0f172a; }
      .stageSub { font-size: 14px; fill: #64748b; font-style: italic; }
      .panelBg { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1; rx: 12; }
      .box { fill: #ffffff; stroke: #475569; stroke-width: 1.5; rx: 8; }
      .boxNew { fill: #ecfdf5; stroke: #16a34a; stroke-width: 2; rx: 8; }
      .boxNewRed { fill: #fef2f2; stroke: #dc2626; stroke-width: 2.5; rx: 8; }
      .boxClient { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.5; rx: 8; }
      .boxControl { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; rx: 8; }
      .boxData { fill: #f3e8ff; stroke: #9333ea; stroke-width: 1.5; rx: 8; }
      .boxExt { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.5; stroke-dasharray: 5,3; rx: 8; }
      .boxLabel { font-size: 14px; font-weight: 600; fill: #0f172a; text-anchor: middle; }
      .boxLabelSmall { font-size: 11px; fill: #475569; text-anchor: middle; }
      .boxLabelTiny { font-size: 10px; fill: #64748b; text-anchor: middle; }
      .arrow { stroke: #475569; stroke-width: 1.5; fill: none; }
      .arrowGreen { stroke: #16a34a; stroke-width: 2; fill: none; }
      .arrowRed { stroke: #dc2626; stroke-width: 2; fill: none; }
      .arrowLabel { font-size: 10px; fill: #64748b; text-anchor: middle; }
      .badge { fill: #16a34a; rx: 4; }
      .badgeRed { fill: #dc2626; rx: 4; }
      .badgeText { font-size: 9px; font-weight: 700; fill: #ffffff; text-anchor: middle; }
      .sectionLabel { font-size: 12px; fill: #94a3b8; text-anchor: start; font-weight: 600; }
    </style>
  </defs>

  <!-- ========================= Header ========================= -->
  <text x="700" y="50" class="title" text-anchor="middle">AgentServer Architecture Evolution</text>
  <text x="700" y="78" font-size="14" fill="#64748b" text-anchor="middle">From "code-server for agents" to "centralized agent loop"</text>

  <!-- Legend -->
  <g transform="translate(60, 100)">
    <rect x="0" y="0" width="14" height="14" class="boxClient"/>
    <text x="22" y="11" font-size="11" fill="#475569">Client</text>
    <rect x="80" y="0" width="14" height="14" class="boxControl"/>
    <text x="102" y="11" font-size="11" fill="#475569">Control</text>
    <rect x="170" y="0" width="14" height="14" class="box"/>
    <text x="192" y="11" font-size="11" fill="#475569">Service</text>
    <rect x="255" y="0" width="14" height="14" class="boxData"/>
    <text x="277" y="11" font-size="11" fill="#475569">Data</text>
    <rect x="335" y="0" width="14" height="14" class="boxExt"/>
    <text x="357" y="11" font-size="11" fill="#475569">External</text>
    <rect x="425" y="0" width="14" height="14" class="boxNew"/>
    <text x="447" y="11" font-size="11" fill="#475569">New in this stage</text>
    <rect x="565" y="0" width="14" height="14" class="boxNewRed"/>
    <text x="587" y="11" font-size="11" fill="#475569">Major architectural shift</text>
  </g>

  <!-- ========================= STAGE 1 ========================= -->
  <g transform="translate(0, 150)">
    <rect x="40" y="0" width="1320" height="600" class="panelBg"/>
    <text x="70" y="40" class="stageTitle">Stage 1 · code-server for Coding Agents</text>
    <text x="70" y="62" class="stageSub">Initial release · per-user sandbox containers · agent loop lives inside the sandbox</text>

    <!-- Browser -->
    <rect x="600" y="100" width="200" height="60" class="boxClient"/>
    <text x="700" y="130" class="boxLabel">Browser (Web UI)</text>
    <text x="700" y="148" class="boxLabelSmall">cli-server frontend</text>

    <!-- cli-server frontend -->
    <rect x="280" y="220" width="240" height="80" class="boxControl"/>
    <text x="400" y="248" class="boxLabel">cli-server (control plane)</text>
    <text x="400" y="266" class="boxLabelSmall">Sessions list · Open/Pause sbx</text>
    <text x="400" y="282" class="boxLabelSmall">REST API · auth</text>

    <!-- Subdomain Proxy -->
    <rect x="880" y="220" width="240" height="80" class="box"/>
    <text x="1000" y="248" class="boxLabel">Subdomain Proxy</text>
    <text x="1000" y="266" class="boxLabelSmall">{sid}.{host} routing</text>
    <text x="1000" y="282" class="boxLabelSmall">token-based auth</text>

    <!-- PostgreSQL -->
    <rect x="280" y="380" width="240" height="60" class="boxData"/>
    <text x="400" y="408" class="boxLabel">PostgreSQL</text>
    <text x="400" y="425" class="boxLabelSmall">sessions · users</text>

    <!-- Sandbox Pod with agent inside -->
    <rect x="780" y="370" width="340" height="180" class="box" stroke-dasharray="6,3" stroke-width="2"/>
    <text x="950" y="395" class="boxLabel">Sandbox Pod (per user)</text>

    <rect x="810" y="410" width="280" height="60" class="box"/>
    <text x="950" y="436" class="boxLabel">opencode / Claude Code</text>
    <text x="950" y="455" class="boxLabelSmall">★ agent loop lives HERE ★</text>

    <rect x="810" y="480" width="280" height="50" class="box"/>
    <text x="950" y="504" class="boxLabel">Anthropic Proxy</text>
    <text x="950" y="520" class="boxLabelSmall">isolates real API key</text>

    <!-- Anthropic external -->
    <rect x="1180" y="455" width="140" height="50" class="boxExt"/>
    <text x="1250" y="481" class="boxLabel">Anthropic API</text>

    <!-- Arrows -->
    <path d="M 660 160 L 400 220" class="arrow" marker-end="url(#arrow)"/>
    <text x="500" y="195" class="arrowLabel">main domain</text>
    <path d="M 740 160 L 1000 220" class="arrow" marker-end="url(#arrow)"/>
    <text x="900" y="195" class="arrowLabel">subdomain</text>

    <path d="M 400 300 L 400 380" class="arrow" marker-end="url(#arrow)"/>
    <path d="M 520 280 L 780 410" class="arrow" marker-end="url(#arrow)" stroke-dasharray="3,3"/>
    <text x="640" y="335" class="arrowLabel">K8s API: create pod</text>

    <path d="M 1000 300 L 1000 410" class="arrow" marker-end="url(#arrow)"/>
    <text x="1030" y="355" class="arrowLabel">HTTP reverse proxy</text>

    <path d="M 1090 505 L 1180 480" class="arrow" marker-end="url(#arrow)"/>
  </g>

  <!-- ========================= STAGE 2 ========================= -->
  <g transform="translate(0, 800)">
    <rect x="40" y="0" width="1320" height="700" class="panelBg"/>
    <text x="70" y="40" class="stageTitle">Stage 2 · The Emergence of OpenClaw</text>
    <text x="70" y="62" class="stageSub">Sandbox becomes a persistent persona · IM channels (WeChat/TG) · multi-backend (opencode / OpenClaw / NanoClaw)</text>

    <!-- Clients -->
    <rect x="200" y="100" width="200" height="60" class="boxClient"/>
    <text x="300" y="130" class="boxLabel">Browser (Web UI)</text>

    <rect x="1000" y="100" width="200" height="60" class="boxNew"/>
    <text x="1100" y="128" class="boxLabel">IM Users</text>
    <text x="1100" y="146" class="boxLabelSmall">WeChat · Telegram · Matrix</text>
    <rect x="1170" y="105" width="28" height="14" class="badge"/>
    <text x="1184" y="115" class="badgeText">NEW</text>

    <!-- Control plane -->
    <rect x="160" y="220" width="240" height="80" class="boxControl"/>
    <text x="280" y="248" class="boxLabel">cli-server (control plane)</text>
    <text x="280" y="266" class="boxLabelSmall">+ rename, traces, workspaces</text>
    <text x="280" y="282" class="boxLabelSmall">+ modelserver tokens</text>

    <rect x="500" y="220" width="240" height="80" class="box"/>
    <text x="620" y="248" class="boxLabel">Subdomain Proxy</text>
    <text x="620" y="266" class="boxLabelSmall">{sid}.{host} routing</text>

    <rect x="900" y="220" width="280" height="80" class="boxNew"/>
    <text x="1040" y="248" class="boxLabel">IM Bridge</text>
    <text x="1040" y="266" class="boxLabelSmall">WeChat polling · TG / Matrix</text>
    <text x="1040" y="282" class="boxLabelSmall">per-sandbox routing</text>
    <rect x="1140" y="225" width="28" height="14" class="badge"/>
    <text x="1154" y="235" class="badgeText">NEW</text>

    <!-- Data -->
    <rect x="100" y="380" width="280" height="80" class="boxData"/>
    <text x="240" y="408" class="boxLabel">PostgreSQL</text>
    <text x="240" y="426" class="boxLabelSmall">+ nanoclaw_bridge_secret</text>
    <text x="240" y="442" class="boxLabelSmall">+ workspace IM credentials (persisted)</text>

    <!-- Sandbox Pod multi-backend -->
    <rect x="450" y="370" width="500" height="240" class="box" stroke-dasharray="6,3" stroke-width="2"/>
    <text x="700" y="395" class="boxLabel">Sandbox Pod (long-lived persona)</text>

    <rect x="475" y="415" width="150" height="55" class="box"/>
    <text x="550" y="440" class="boxLabel">opencode</text>
    <text x="550" y="456" class="boxLabelSmall">(Stage 1)</text>

    <rect x="635" y="415" width="150" height="55" class="boxNew"/>
    <text x="710" y="440" class="boxLabel">OpenClaw</text>
    <text x="710" y="456" class="boxLabelSmall">IM-friendly</text>
    <rect x="755" y="420" width="28" height="14" class="badge"/>
    <text x="769" y="430" class="badgeText">NEW</text>

    <rect x="795" y="415" width="135" height="55" class="boxNew"/>
    <text x="862" y="440" class="boxLabel">NanoClaw</text>
    <text x="862" y="456" class="boxLabelSmall">light fork</text>
    <rect x="900" y="420" width="28" height="14" class="badge"/>
    <text x="914" y="430" class="badgeText">NEW</text>

    <text x="700" y="495" class="boxLabelSmall" font-style="italic">★ agent loop still HERE ★ — but now reachable from IM</text>

    <rect x="475" y="520" width="455" height="70" class="boxNew"/>
    <text x="702" y="546" class="boxLabel">LLM Proxy + ModelServer</text>
    <text x="702" y="565" class="boxLabelSmall">CustomModels for OpenClaw · token injection</text>
    <text x="702" y="580" class="boxLabelSmall">Workspace-scoped LLM config</text>
    <rect x="855" y="525" width="28" height="14" class="badge"/>
    <text x="869" y="535" class="badgeText">NEW</text>

    <!-- External LLMs -->
    <rect x="1020" y="540" width="240" height="50" class="boxExt"/>
    <text x="1140" y="566" class="boxLabel">Anthropic / Custom LLMs</text>

    <!-- Arrows -->
    <path d="M 280 160 L 280 220" class="arrow" marker-end="url(#arrow)"/>
    <path d="M 320 160 L 600 220" class="arrow" marker-end="url(#arrow)"/>
    <path d="M 1100 160 L 1040 220" class="arrowGreen" marker-end="url(#arrowGreen)"/>

    <path d="M 280 300 L 240 380" class="arrow" marker-end="url(#arrow)"/>
    <path d="M 350 300 L 600 370" class="arrow" marker-end="url(#arrow)" stroke-dasharray="3,3"/>
    <text x="490" y="335" class="arrowLabel">K8s create pod</text>

    <path d="M 620 300 L 620 370" class="arrow" marker-end="url(#arrow)"/>
    <text x="650" y="340" class="arrowLabel">HTTP proxy</text>

    <path d="M 1040 300 L 850 370" class="arrowGreen" marker-end="url(#arrowGreen)"/>
    <text x="970" y="335" class="arrowLabel" fill="#16a34a">IM messages</text>

    <path d="M 930 555 L 1020 562" class="arrow" marker-end="url(#arrow)"/>
  </g>

  <!-- ========================= STAGE 3 ========================= -->
  <g transform="translate(0, 1550)">
    <rect x="40" y="0" width="1320" height="820" class="panelBg"/>
    <text x="70" y="40" class="stageTitle">Stage 3 · Centralized Agent-Loop</text>
    <text x="70" y="62" class="stageSub">cc-broker absorbs the loop · sandboxes become stateless workers · MCP ToolRouter unifies tool dispatch</text>

    <!-- Clients row -->
    <rect x="80" y="100" width="180" height="55" class="boxClient"/>
    <text x="170" y="130" class="boxLabel">Browser / WebUI</text>
    <text x="170" y="146" class="boxLabelSmall">workspaces · sandboxes</text>

    <rect x="290" y="100" width="180" height="55" class="boxClient"/>
    <text x="380" y="130" class="boxLabel">IM Users</text>
    <text x="380" y="146" class="boxLabelSmall">WeChat · TG · Matrix</text>

    <rect x="500" y="100" width="220" height="55" class="boxNew"/>
    <text x="610" y="128" class="boxLabel">External API caller</text>
    <text x="610" y="146" class="boxLabelSmall">POST /api/turns</text>
    <rect x="680" y="105" width="32" height="14" class="badge"/>
    <text x="696" y="115" class="badgeText">NEW</text>

    <rect x="750" y="100" width="220" height="55" class="boxNew"/>
    <text x="860" y="128" class="boxLabel">Other Agents (a2a)</text>
    <text x="860" y="146" class="boxLabelSmall">agent_cards · discovery</text>
    <rect x="930" y="105" width="32" height="14" class="badge"/>
    <text x="946" y="115" class="badgeText">NEW</text>

    <rect x="1000" y="100" width="320" height="55" class="boxClient"/>
    <text x="1160" y="128" class="boxLabel">Local agents (via tunnel)</text>
    <text x="1160" y="146" class="boxLabelSmall">agentserver-agent · WSS yamux</text>

    <!-- agentserver control plane (wide bar) -->
    <rect x="80" y="190" width="1240" height="70" class="boxControl"/>
    <text x="700" y="218" class="boxLabel">agentserver  (control plane)</text>
    <text x="700" y="238" class="boxLabelSmall">workspaces · sandboxes · auth · webhook ingress · tunnel registry · sandbox lifecycle</text>
    <text x="700" y="252" class="boxLabelSmall">REST: /api/{auth, workspaces, sandboxes, agent/tasks, credentials}</text>

    <!-- Mid services row -->
    <rect x="80" y="310" width="280" height="120" class="box"/>
    <text x="220" y="338" class="boxLabel">Sandbox Pods</text>
    <text x="220" y="356" class="boxLabelSmall" font-style="italic">now WORKERS (no loop)</text>
    <rect x="105" y="370" width="230" height="45" class="box"/>
    <text x="220" y="392" class="boxLabel">CC Worker</text>
    <text x="220" y="408" class="boxLabelSmall">stateless · executes tool actions</text>

    <rect x="400" y="310" width="240" height="120" class="box"/>
    <text x="520" y="338" class="boxLabel">IM Bridge</text>
    <text x="520" y="358" class="boxLabelSmall">inbound IM → resolve session</text>
    <text x="520" y="376" class="boxLabelSmall">outbound: send_message / image / file</text>

    <rect x="680" y="310" width="280" height="120" class="boxNew"/>
    <text x="820" y="338" class="boxLabel">executor-registry</text>
    <text x="820" y="358" class="boxLabelSmall">long-lived executor registry</text>
    <text x="820" y="376" class="boxLabelSmall">heartbeat · discovery</text>
    <text x="820" y="394" class="boxLabelSmall">POST /api/execute</text>
    <rect x="888" y="318" width="32" height="14" class="badge"/>
    <text x="904" y="328" class="badgeText">NEW</text>

    <rect x="1000" y="310" width="320" height="120" class="boxData"/>
    <text x="1160" y="338" class="boxLabel">PostgreSQL</text>
    <text x="1160" y="358" class="boxLabelSmall">sessions · events · workers</text>
    <text x="1160" y="376" class="boxLabelSmall">agent_cards · executors</text>
    <text x="1160" y="394" class="boxLabelSmall">credential_bindings · quotas</text>

    <!-- cc-broker (highlighted) -->
    <rect x="180" y="480" width="1040" height="220" class="boxNewRed"/>
    <text x="700" y="510" class="boxLabel" font-size="20">cc-broker  :8085</text>
    <rect x="640" y="490" width="120" height="20" class="badgeRed"/>
    <text x="700" y="504" class="badgeText" font-size="11">★ MAJOR SHIFT ★</text>

    <rect x="220" y="525" width="960" height="60" fill="#ffffff" stroke="#dc2626" stroke-width="1.5" rx="6"/>
    <text x="700" y="552" class="boxLabel" fill="#dc2626">★ AGENT LOOP LIVES HERE NOW ★</text>
    <text x="700" y="572" class="boxLabelSmall">Sessions · Workers · SSE broker · Turn lock · Dedup · OpenViking file transfer</text>

    <rect x="220" y="600" width="960" height="80" fill="#ffffff" stroke="#dc2626" stroke-width="1.5" rx="6"/>
    <text x="700" y="624" class="boxLabel">MCP Server  +  ToolRouter</text>
    <text x="700" y="642" class="boxLabelSmall">workspace_*  →  workspace fs (via OpenViking)</text>
    <text x="700" y="657" class="boxLabelSmall">remote_*  →  executor-registry      |     send_message / send_image  →  IM Bridge</text>
    <text x="700" y="672" class="boxLabelSmall">schedule_*  →  scheduling backend</text>

    <!-- llmproxy -->
    <rect x="180" y="730" width="280" height="60" class="boxNew"/>
    <text x="320" y="757" class="boxLabel">llmproxy  :8081</text>
    <text x="320" y="775" class="boxLabelSmall">quotas · usage tracking · token injection</text>
    <rect x="375" y="735" width="32" height="14" class="badge"/>
    <text x="391" y="745" class="badgeText">NEW</text>

    <rect x="500" y="730" width="280" height="60" class="boxExt"/>
    <text x="640" y="757" class="boxLabel">Anthropic / Gemini</text>

    <!-- Arrows clients → agentserver -->
    <path d="M 170 155 L 170 190" class="arrow" marker-end="url(#arrow)"/>
    <path d="M 380 155 L 380 190" class="arrow" marker-end="url(#arrow)"/>
    <path d="M 610 155 L 610 190" class="arrowGreen" marker-end="url(#arrowGreen)"/>
    <path d="M 860 155 L 860 190" class="arrowGreen" marker-end="url(#arrowGreen)"/>
    <path d="M 1160 155 L 1160 190" class="arrow" marker-end="url(#arrow)"/>

    <!-- agentserver → mid services -->
    <path d="M 220 260 L 220 310" class="arrow" marker-end="url(#arrow)"/>
    <path d="M 520 260 L 520 310" class="arrow" marker-end="url(#arrow)"/>
    <path d="M 820 260 L 820 310" class="arrowGreen" marker-end="url(#arrowGreen)"/>
    <path d="M 1160 260 L 1160 310" class="arrow" marker-end="url(#arrow)"/>

    <!-- mid services → cc-broker -->
    <path d="M 220 430 L 350 480" class="arrowRed" marker-end="url(#arrowRed)"/>
    <text x="240" y="465" class="arrowLabel" fill="#dc2626">SSE / events</text>
    <path d="M 520 430 L 600 480" class="arrowRed" marker-end="url(#arrowRed)"/>
    <path d="M 820 430 L 850 480" class="arrowRed" marker-end="url(#arrowRed)"/>

    <!-- cc-broker → llmproxy -->
    <path d="M 320 700 L 320 730" class="arrow" marker-end="url(#arrow)"/>
    <path d="M 460 760 L 500 760" class="arrow" marker-end="url(#arrow)"/>

    <!-- arrow back from cc-broker to db -->
    <path d="M 1160 480 L 1160 430" class="arrow" marker-end="url(#arrow)" stroke-dasharray="3,3"/>
    <text x="1200" y="465" class="arrowLabel">persist</text>
  </g>

  <!-- ========================= Footer narrative ========================= -->
  <g transform="translate(0, 2380)">
    <text x="700" y="0" font-size="13" fill="#475569" text-anchor="middle" font-style="italic">
      Stage 1 puts the LLM in a container · Stage 2 gives the container an identity · Stage 3 lifts the loop out, leaving only the hands.
    </text>
  </g>
</svg>
