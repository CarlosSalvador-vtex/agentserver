openapi: 3.0.0
info:
  contact: {}
  description: |-
    Public REST API for agentserver. Generated from
    Go handler annotations via swaggo/swag; see
    docs/api/README.md for regeneration instructions.
  title: agentserver API
  version: 0.1.0
paths:
  /api/auth/check:
    get:
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatusResponse"
        "401":
          description: unauthorized
          content:
            application/json:
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: Check session validity
      tags:
        - Auth
  /api/auth/login:
    post:
      description: Validates credentials; on success sets the session cookie and
        returns {"status":"ok"}.
      requestBody:
        $ref: "#/components/requestBodies/AuthCredentials"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatusResponse"
        "400":
          description: bad request
          content:
            application/json:
              schema:
                type: string
        "401":
          description: invalid credentials
          content:
            application/json:
              schema:
                type: string
      summary: Log in with email + password
      tags:
        - Auth
  /api/auth/logout:
    post:
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatusResponse"
      summary: Log out (clear session cookie)
      tags:
        - Auth
  /api/auth/me:
    get:
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"
        "404":
          description: user not found
          content:
            application/json:
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: Get current user profile
      tags:
        - Auth
  /api/auth/register:
    post:
      description: On success returns the new user id. The first registered user
        becomes admin.
      requestBody:
        $ref: "#/components/requestBodies/AuthCredentials"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthRegisterResponse"
        "400":
          description: bad request / email and password required
          content:
            application/json:
              schema:
                type: string
        "409":
          description: email already taken
          content:
            application/json:
              schema:
                type: string
        "500":
          description: internal error / failed to create user
          content:
            application/json:
              schema:
                type: string
      summary: Register a new user
      tags:
        - Auth
  "/api/sandboxes/{id}":
    delete:
      parameters:
        - description: Sandbox id
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        "403":
          description: not a member
          content:
            "*/*":
              schema:
                type: string
        "404":
          description: sandbox not found
          content:
            "*/*":
              schema:
                type: string
        "500":
          description: internal error
          content:
            "*/*":
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: Delete a sandbox
      tags:
        - Sandboxes
    get:
      parameters:
        - description: Sandbox id
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sandbox"
        "403":
          description: not a member
          content:
            application/json:
              schema:
                type: string
        "404":
          description: sandbox not found
          content:
            application/json:
              schema:
                type: string
        "500":
          description: internal error
          content:
            application/json:
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: Get a sandbox by id
      tags:
        - Sandboxes
    patch:
      parameters:
        - description: Sandbox id
          in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SandboxRenameRequest"
        description: New name
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sandbox"
        "400":
          description: name required
          content:
            application/json:
              schema:
                type: string
        "403":
          description: not a member
          content:
            application/json:
              schema:
                type: string
        "404":
          description: sandbox not found
          content:
            application/json:
              schema:
                type: string
        "500":
          description: internal error
          content:
            application/json:
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: Rename a sandbox
      tags:
        - Sandboxes
  "/api/sandboxes/{id}/im/bind":
    delete:
      parameters:
        - description: Sandbox id
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IMSandboxUnbindResponse"
        "403":
          description: not a member
          content:
            application/json:
              schema:
                type: string
        "404":
          description: sandbox not found
          content:
            application/json:
              schema:
                type: string
        "500":
          description: internal error
          content:
            application/json:
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: Unbind a sandbox from its IM channel
      tags:
        - IM Channels
    post:
      parameters:
        - description: Sandbox id
          in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IMSandboxBindRequest"
        description: Channel id
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IMSandboxBindResponse"
        "400":
          description: bad request
          content:
            application/json:
              schema:
                type: string
        "403":
          description: not a member
          content:
            application/json:
              schema:
                type: string
        "404":
          description: sandbox or channel not found
          content:
            application/json:
              schema:
                type: string
        "500":
          description: internal error
          content:
            application/json:
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: Bind a sandbox to an IM channel
      tags:
        - IM Channels
  "/api/sandboxes/{id}/pause":
    post:
      description: Initiates pause transition; returns {"status":"pausing"}. Final
        state lands asynchronously.
      parameters:
        - description: Sandbox id
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxLifecycleStatusResponse"
        "400":
          description: local sandbox cannot be paused
          content:
            application/json:
              schema:
                type: string
        "403":
          description: not a member
          content:
            application/json:
              schema:
                type: string
        "404":
          description: sandbox not found
          content:
            application/json:
              schema:
                type: string
        "409":
          description: invalid state for pause
          content:
            application/json:
              schema:
                type: string
        "500":
          description: internal error
          content:
            application/json:
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: Pause a sandbox (cloud sandboxes only)
      tags:
        - Sandboxes
  "/api/sandboxes/{id}/resume":
    post:
      description: Initiates resume transition; returns {"status":"resuming"}. Final
        state lands asynchronously.
      parameters:
        - description: Sandbox id
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxLifecycleStatusResponse"
        "400":
          description: local sandbox cannot be resumed
          content:
            application/json:
              schema:
                type: string
        "403":
          description: not a member
          content:
            application/json:
              schema:
                type: string
        "404":
          description: sandbox not found
          content:
            application/json:
              schema:
                type: string
        "409":
          description: invalid state for resume
          content:
            application/json:
              schema:
                type: string
        "500":
          description: internal error
          content:
            application/json:
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: Resume a paused sandbox (cloud sandboxes only)
      tags:
        - Sandboxes
  "/api/sandboxes/{id}/usage":
    get:
      parameters:
        - description: Sandbox id
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxUsage"
        "403":
          description: not a member
          content:
            application/json:
              schema:
                type: string
        "404":
          description: sandbox not found
          content:
            application/json:
              schema:
                type: string
        "500":
          description: internal error
          content:
            application/json:
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: Get sandbox usage stats
      tags:
        - Sandboxes
  /api/workspaces:
    get:
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Workspace"
                type: array
        "500":
          description: internal error
          content:
            application/json:
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: List workspaces for the current user
      tags:
        - Workspaces
    post:
      description: Creator is auto-added as owner. May fail with 403 if the per-user
        workspace quota is exceeded.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceCreateRequest"
        description: Workspace name
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "400":
          description: bad request / empty name
          content:
            application/json:
              schema:
                type: string
        "403":
          description: workspace quota exceeded
          content:
            application/json:
              schema:
                type: string
        "500":
          description: internal error
          content:
            application/json:
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: Create a new workspace
      tags:
        - Workspaces
  "/api/workspaces/{id}":
    delete:
      parameters:
        - description: Workspace id
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        "403":
          description: owner only
          content:
            "*/*":
              schema:
                type: string
        "500":
          description: internal error
          content:
            "*/*":
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: Delete a workspace (owner only; cascades to sandboxes + namespace)
      tags:
        - Workspaces
    get:
      parameters:
        - description: Workspace id
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "403":
          description: not a member
          content:
            application/json:
              schema:
                type: string
        "404":
          description: workspace not found
          content:
            application/json:
              schema:
                type: string
        "500":
          description: internal error
          content:
            application/json:
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: Get a workspace by id
      tags:
        - Workspaces
    patch:
      parameters:
        - description: Workspace id
          in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceRenameRequest"
        description: New name
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "400":
          description: empty name
          content:
            application/json:
              schema:
                type: string
        "403":
          description: owner or maintainer required
          content:
            application/json:
              schema:
                type: string
        "500":
          description: internal error
          content:
            application/json:
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: Rename a workspace
      tags:
        - Workspaces
  "/api/workspaces/{id}/im/channels":
    get:
      parameters:
        - description: Workspace id
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IMChannelListResponse"
        "403":
          description: not a member
          content:
            application/json:
              schema:
                type: string
        "500":
          description: internal error
          content:
            application/json:
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: List IM channels in a workspace
      tags:
        - IM Channels
  "/api/workspaces/{id}/im/channels/{channelId}":
    delete:
      parameters:
        - description: Workspace id
          in: path
          name: id
          required: true
          schema:
            type: string
        - description: Channel id
          in: path
          name: channelId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        "403":
          description: not a member
          content:
            "*/*":
              schema:
                type: string
        "404":
          description: channel not found
          content:
            "*/*":
              schema:
                type: string
        "500":
          description: internal error
          content:
            "*/*":
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: Delete an IM channel
      tags:
        - IM Channels
    patch:
      parameters:
        - description: Workspace id
          in: path
          name: id
          required: true
          schema:
            type: string
        - description: Channel id
          in: path
          name: channelId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IMChannelPatchRequest"
        description: Settings patch
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IMChannelPatchResponse"
        "400":
          description: bad request
          content:
            application/json:
              schema:
                type: string
        "403":
          description: not a member
          content:
            application/json:
              schema:
                type: string
        "404":
          description: channel not found
          content:
            application/json:
              schema:
                type: string
        "500":
          description: internal error
          content:
            application/json:
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: Update IM channel settings
      tags:
        - IM Channels
  "/api/workspaces/{id}/im/matrix/configure":
    post:
      parameters:
        - description: Workspace id
          in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IMMatrixConfigureRequest"
        description: Matrix credentials
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IMMatrixConfigureResponse"
        "400":
          description: invalid credentials
          content:
            application/json:
              schema:
                type: string
        "403":
          description: not a member
          content:
            application/json:
              schema:
                type: string
        "500":
          description: internal error
          content:
            application/json:
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: Bind a Matrix account to a workspace
      tags:
        - IM Channels
  "/api/workspaces/{id}/im/telegram/configure":
    post:
      parameters:
        - description: Workspace id
          in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IMTelegramConfigureRequest"
        description: Bot token
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IMTelegramConfigureResponse"
        "400":
          description: invalid bot token
          content:
            application/json:
              schema:
                type: string
        "403":
          description: not a member
          content:
            application/json:
              schema:
                type: string
        "500":
          description: internal error
          content:
            application/json:
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: Bind a Telegram bot to a workspace
      tags:
        - IM Channels
  "/api/workspaces/{id}/im/weixin/qr-start":
    post:
      description: Returns a QR code URL the user scans in WeChat. Client should then
        long-poll qr-wait until the channel is bound.
      parameters:
        - description: Workspace id
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IMWeixinQRStartResponse"
        "403":
          description: not a member
          content:
            application/json:
              schema:
                type: string
        "502":
          description: upstream error
          content:
            application/json:
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: Start WeChat QR-code bind for a workspace
      tags:
        - IM Channels
  "/api/workspaces/{id}/im/weixin/qr-wait":
    post:
      description: Polls for QR scan progress. Returns status "wait", "scaned",
        "confirmed", "expired", or other terminal states. On "confirmed", bot_id
        is set. On "expired", qrcode_url contains a refreshed code.
      parameters:
        - description: Workspace id
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IMWeixinQRWaitResponse"
        "400":
          description: no active session
          content:
            application/json:
              schema:
                type: string
        "403":
          description: not a member
          content:
            application/json:
              schema:
                type: string
        "502":
          description: upstream error
          content:
            application/json:
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: Long-poll WeChat QR-code scan for a workspace
      tags:
        - IM Channels
  "/api/workspaces/{id}/llm-config":
    delete:
      parameters:
        - description: Workspace id
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        "403":
          description: insufficient role
          content:
            "*/*":
              schema:
                type: string
        "500":
          description: internal error
          content:
            "*/*":
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: Delete workspace LLM config (owner/maintainer)
      tags:
        - Workspaces
    get:
      description: The returned api_key is masked (first 3 + "..." + last 4).
        updated_at is null when no config is set.
      parameters:
        - description: Workspace id
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LLMConfigResponse"
        "403":
          description: insufficient role
          content:
            application/json:
              schema:
                type: string
        "500":
          description: internal error
          content:
            application/json:
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: Get workspace LLM config (owner/maintainer)
      tags:
        - Workspaces
    put:
      description: On update, omitting api_key retains the existing key.
      parameters:
        - description: Workspace id
          in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LLMConfigUpsertRequest"
        description: Config payload
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LLMConfigUpsertResponse"
        "400":
          description: validation error (invalid URL / missing field / too many models)
          content:
            application/json:
              schema:
                type: string
        "403":
          description: insufficient role
          content:
            application/json:
              schema:
                type: string
        "500":
          description: internal error
          content:
            application/json:
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: Upsert workspace LLM config (owner/maintainer)
      tags:
        - Workspaces
  "/api/workspaces/{id}/llm-quota":
    get:
      parameters:
        - description: Workspace id
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LLMQuotaResponse"
        "403":
          description: insufficient role
          content:
            application/json:
              schema:
                type: string
        "500":
          description: internal error
          content:
            application/json:
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: Get the workspace's daily LLM request quota usage
      tags:
        - Workspaces
  "/api/workspaces/{id}/members":
    get:
      parameters:
        - description: Workspace id
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/WorkspaceMember"
                type: array
        "403":
          description: not a member
          content:
            application/json:
              schema:
                type: string
        "500":
          description: internal error
          content:
            application/json:
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: List members of a workspace
      tags:
        - Workspaces
    post:
      description: Looks up the user by email. Default role is "developer" if omitted.
      parameters:
        - description: Workspace id
          in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberAddRequest"
        description: Email and optional role
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMember"
        "400":
          description: bad request
          content:
            application/json:
              schema:
                type: string
        "403":
          description: owner or maintainer required
          content:
            application/json:
              schema:
                type: string
        "404":
          description: user not found
          content:
            application/json:
              schema:
                type: string
        "500":
          description: internal error
          content:
            application/json:
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: Add a member to a workspace
      tags:
        - Workspaces
  "/api/workspaces/{id}/members/{userId}":
    delete:
      parameters:
        - description: Workspace id
          in: path
          name: id
          required: true
          schema:
            type: string
        - description: User id
          in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        "403":
          description: owner only
          content:
            "*/*":
              schema:
                type: string
        "500":
          description: internal error
          content:
            "*/*":
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: Remove a member (owner only)
      tags:
        - Workspaces
    put:
      parameters:
        - description: Workspace id
          in: path
          name: id
          required: true
          schema:
            type: string
        - description: User id
          in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberRoleUpdateRequest"
        description: New role
        required: true
      responses:
        "204":
          description: No Content
        "400":
          description: empty role
          content:
            "*/*":
              schema:
                type: string
        "403":
          description: owner only
          content:
            "*/*":
              schema:
                type: string
        "500":
          description: internal error
          content:
            "*/*":
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: Change a member's role (owner only)
      tags:
        - Workspaces
  "/api/workspaces/{wid}/sandboxes":
    get:
      parameters:
        - description: Workspace id
          in: path
          name: wid
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Sandbox"
                type: array
        "403":
          description: not a member
          content:
            application/json:
              schema:
                type: string
        "500":
          description: internal error
          content:
            application/json:
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: List sandboxes in a workspace
      tags:
        - Sandboxes
    post:
      description: Validates type / CPU / memory / idle_timeout / quota / budget.
        Returns 201 immediately with status="provisioning"; container starts
        asynchronously.
      parameters:
        - description: Workspace id
          in: path
          name: wid
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SandboxCreateRequest"
        description: Create payload
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sandbox"
        "400":
          description: validation error (type/cpu/memory/idle_timeout)
          content:
            application/json:
              schema:
                type: string
        "403":
          description: insufficient role / quota / budget
          content:
            application/json:
              schema:
                type: string
        "500":
          description: internal error
          content:
            application/json:
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: Create a sandbox in a workspace
      tags:
        - Sandboxes
  /api/workspaces/quota:
    get:
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceQuotaResponse"
        "500":
          description: internal error
          content:
            application/json:
              schema:
                type: string
      security:
        - CookieAuth: []
      summary: Get per-user workspace quota
      tags:
        - Workspaces
servers:
  - url: /
components:
  requestBodies:
    AuthCredentials:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AuthCredentials"
      description: Email and password
      required: true
  securitySchemes:
    CookieAuth:
      description: Session cookie set by POST /api/auth/login. All non-auth endpoints
        assume this cookie.
      in: cookie
      name: agentserver-token
      type: apiKey
  schemas:
    AgentInfo:
      properties:
        agent_version:
          type: string
        cpu_count_logical:
          type: integer
        cpu_model_name:
          type: string
        disk_free:
          type: integer
        disk_total:
          type: integer
        hostname:
          type: string
        kernel_arch:
          type: string
        memory_total:
          type: integer
        opencode_version:
          type: string
        os:
          type: string
        platform:
          type: string
        platform_version:
          type: string
        updated_at:
          type: string
        workdir:
          type: string
      required:
        - agent_version
        - cpu_count_logical
        - cpu_model_name
        - disk_free
        - disk_total
        - hostname
        - kernel_arch
        - memory_total
        - opencode_version
        - os
        - platform
        - platform_version
        - updated_at
        - workdir
      type: object
    AuthCredentials:
      properties:
        email:
          example: alice@example.com
          type: string
        password:
          example: hunter2
          type: string
      required:
        - email
        - password
      type: object
    AuthMeResponse:
      properties:
        email:
          type: string
        id:
          type: string
        name:
          type: string
          nullable: true
        picture:
          type: string
          nullable: true
        role:
          example: developer
          type: string
      required:
        - email
        - id
        - role
      type: object
    AuthRegisterResponse:
      properties:
        email:
          example: alice@example.com
          type: string
        id:
          example: 7e7a4f6c-...
          type: string
      required:
        - email
        - id
      type: object
    AuthStatusResponse:
      properties:
        status:
          example: ok
          type: string
      required:
        - status
      type: object
    IMBinding:
      properties:
        bot_id:
          type: string
        bound_at:
          type: string
        provider:
          type: string
        user_id:
          type: string
      required:
        - bot_id
        - bound_at
        - provider
      type: object
    IMChannel:
      properties:
        bot_id:
          type: string
        bound_at:
          type: string
        id:
          type: string
        provider:
          example: weixin
          type: string
        require_mention:
          type: boolean
        routing_mode:
          example: codex
          type: string
        user_id:
          type: string
        workspace_id:
          type: string
      required:
        - bot_id
        - bound_at
        - id
        - provider
        - routing_mode
        - workspace_id
      type: object
    IMChannelListResponse:
      properties:
        channels:
          items:
            $ref: "#/components/schemas/IMChannel"
          type: array
      required:
        - channels
      type: object
    IMChannelPatchRequest:
      properties:
        require_mention:
          type: boolean
          nullable: true
        routing_mode:
          example: codex
          type: string
          nullable: true
      type: object
    IMChannelPatchResponse:
      properties:
        status:
          example: updated
          type: string
      required:
        - status
      type: object
    IMMatrixConfigureRequest:
      properties:
        access_token:
          type: string
        homeserver_url:
          example: https://matrix.example.com
          type: string
        recovery_key:
          description: optional, for E2EE
          type: string
      required:
        - access_token
        - homeserver_url
      type: object
    IMMatrixConfigureResponse:
      properties:
        bot_id:
          type: string
        connected:
          type: boolean
      required:
        - bot_id
        - connected
      type: object
    IMSandboxBindRequest:
      properties:
        channel_id:
          type: string
      required:
        - channel_id
      type: object
    IMSandboxBindResponse:
      properties:
        status:
          example: bound
          type: string
      required:
        - status
      type: object
    IMSandboxUnbindResponse:
      properties:
        status:
          example: unbound
          type: string
      required:
        - status
      type: object
    IMTelegramConfigureRequest:
      properties:
        bot_token:
          example: 123456:ABC-DEF...
          type: string
      required:
        - bot_token
      type: object
    IMTelegramConfigureResponse:
      properties:
        bot_id:
          type: string
        connected:
          type: boolean
      required:
        - bot_id
        - connected
      type: object
    IMWeixinQRStartResponse:
      properties:
        message:
          type: string
        qrcode_url:
          type: string
      required:
        - message
        - qrcode_url
      type: object
    IMWeixinQRWaitResponse:
      properties:
        bot_id:
          type: string
          nullable: true
        connected:
          type: boolean
        message:
          type: string
          nullable: true
        qrcode_url:
          type: string
          nullable: true
        status:
          example: wait
          type: string
        user_id:
          type: string
          nullable: true
      required:
        - status
      type: object
    LLMConfigResponse:
      properties:
        api_key:
          type: string
        base_url:
          type: string
        configured:
          type: boolean
        models:
          items:
            $ref: "#/components/schemas/LLMModel"
          type: array
        updated_at:
          type: string
          nullable: true
      required:
        - configured
      type: object
    LLMConfigUpsertRequest:
      properties:
        api_key:
          description: optional on update
          example: sk-ant-...
          type: string
        base_url:
          example: https://api.anthropic.com
          type: string
        models:
          items:
            $ref: "#/components/schemas/LLMModel"
          type: array
      required:
        - base_url
        - models
      type: object
    LLMConfigUpsertResponse:
      properties:
        ok:
          type: boolean
      required:
        - ok
      type: object
    LLMModel:
      properties:
        id:
          example: claude-opus-4-7
          type: string
        name:
          example: Claude Opus 4.7
          type: string
      required:
        - id
        - name
      type: object
    LLMQuotaResponse:
      properties:
        default_max_rpd:
          type: integer
        today_request_count:
          type: integer
        workspace_quota:
          allOf:
            - $ref: "#/components/schemas/LLMWorkspaceQuotaPart"
          nullable: true
      required:
        - default_max_rpd
        - today_request_count
      type: object
    LLMWorkspaceQuotaPart:
      properties:
        max_rpd:
          type: integer
          nullable: true
        updated_at:
          type: string
        workspace_id:
          type: string
      required:
        - updated_at
        - workspace_id
      type: object
    MemberAddRequest:
      properties:
        email:
          example: alice@example.com
          type: string
        role:
          description: optional; defaults to "developer"
          example: developer
          type: string
      required:
        - email
      type: object
    MemberRoleUpdateRequest:
      properties:
        role:
          example: maintainer
          type: string
      required:
        - role
      type: object
    Sandbox:
      properties:
        agent_info:
          $ref: "#/components/schemas/AgentInfo"
        claudecode_url:
          type: string
        cpu:
          type: integer
        created_at:
          type: string
        custom_url:
          type: string
        id:
          type: string
        idle_timeout:
          type: integer
        im_bindings:
          items:
            $ref: "#/components/schemas/IMBinding"
          type: array
        is_local:
          type: boolean
        jupyter_url:
          type: string
        last_activity_at:
          type: string
          nullable: true
        last_heartbeat_at:
          type: string
        memory:
          type: integer
        metadata:
          additionalProperties: true
          type: object
        name:
          type: string
        openclaw_url:
          type: string
        opencode_url:
          type: string
        paused_at:
          type: string
          nullable: true
        short_id:
          type: string
        status:
          type: string
        type:
          type: string
        weixin_bindings:
          items:
            $ref: "#/components/schemas/IMBinding"
          type: array
        workspace_id:
          type: string
      required:
        - created_at
        - id
        - is_local
        - name
        - status
        - type
        - workspace_id
      type: object
    SandboxCreateRequest:
      properties:
        cpu:
          description: optional; millicores, e.g. 500 or 2000
          type: integer
        idle_timeout:
          description: optional; seconds
          type: integer
        memory:
          description: optional; bytes, e.g. 536870912 (512Mi)
          type: integer
        metadata:
          additionalProperties: true
          description: optional; arbitrary key-value metadata
          type: object
        name:
          example: my-sandbox
          type: string
        type:
          description: optional; default "opencode"
          example: opencode
          type: string
      required:
        - name
      type: object
    SandboxLifecycleStatusResponse:
      properties:
        status:
          example: pausing
          type: string
      required:
        - status
      type: object
    SandboxRenameRequest:
      properties:
        name:
          example: renamed-sandbox
          type: string
      required:
        - name
      type: object
    SandboxUsage:
      properties:
        since:
          example: 2026-01-01T00:00:00Z
          type: string
          nullable: true
        usage:
          items:
            $ref: "#/components/schemas/SandboxUsageSummary"
          type: array
      required:
        - usage
      type: object
    SandboxUsageSummary:
      properties:
        cache_creation_input_tokens:
          type: integer
        cache_read_input_tokens:
          type: integer
        input_tokens:
          type: integer
        model:
          example: claude-sonnet-4-6
          type: string
        output_tokens:
          type: integer
        provider:
          example: anthropic
          type: string
        request_count:
          type: integer
      required:
        - cache_creation_input_tokens
        - cache_read_input_tokens
        - input_tokens
        - model
        - output_tokens
        - provider
        - request_count
      type: object
    Workspace:
      properties:
        created_at:
          type: string
        id:
          type: string
        name:
          type: string
        updated_at:
          type: string
      required:
        - created_at
        - id
        - name
        - updated_at
      type: object
    WorkspaceCreateRequest:
      properties:
        name:
          example: My Workspace
          type: string
      required:
        - name
      type: object
    WorkspaceMember:
      properties:
        email:
          type: string
        picture:
          type: string
          nullable: true
        role:
          example: developer
          type: string
        user_id:
          type: string
      required:
        - email
        - role
        - user_id
      type: object
    WorkspaceQuotaResponse:
      properties:
        current:
          type: integer
        max:
          type: integer
      required:
        - current
        - max
      type: object
    WorkspaceRenameRequest:
      properties:
        name:
          example: Renamed Workspace
          type: string
      required:
        - name
      type: object
